<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>글자 연결 · 방아 찧는 호랑이</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="common.css" />
    <style>
        /* Timer */
        @keyframes timerPulse {

            0%,
            100% {
                transform: scale(1);
                color: #DC2626;
            }

            50% {
                /* 타이머 영역이 커지는 효과의 폭을 절반(1.2배 -> 1.1배)으로 줄입니다. */
                transform: scale(1.1);
                color: #EF4444;
            }
        }

        .timer-warning {
            animation: timerPulse 0.8s ease-in-out infinite;
        }

        @keyframes hintBlink {

            0%,
            100% {
                transform: scale(1);
                border-color: #F97316;
                box-shadow: 0 0 0 0 rgba(249, 115, 22, 0);
            }

            50% {
                transform: scale(1.12);
                border-color: #FB923C;
                box-shadow: 0 0 0 8px rgba(249, 115, 22, 0.2);
            }
        }

        @keyframes rideLine {
            0% {
                transform: translate(0, 0) scale(.6);
                opacity: 0;
            }

            15% {
                transform: translate(calc(var(--tx)*.15), calc(var(--ty)*.15)) scale(1.1);
                opacity: 1;
            }

            85% {
                transform: translate(calc(var(--tx)*.95), calc(var(--ty)*.95)) scale(1.1);
                opacity: 1;
            }

            100% {
                transform: translate(var(--tx), var(--ty)) scale(1.3);
                opacity: 0;
            }
        }

        @keyframes defPopIn {
            0% {
                transform: scale(.5) translateY(40px);
                opacity: 0;
            }

            60% {
                transform: scale(1.05) translateY(-5px);
                opacity: 1;
            }

            100% {
                transform: scale(1) translateY(0);
                opacity: 1;
            }
        }

        .def-pop-in {
            animation: defPopIn 0.55s cubic-bezier(.34, 1.56, .64, 1) forwards;
        }

        @keyframes celebrateTitle {
            0% {
                transform: scale(0) rotate(-15deg);
                opacity: 0;
            }

            60% {
                transform: scale(1.15) rotate(3deg);
                opacity: 1;
            }

            100% {
                transform: scale(1) rotate(0deg);
                opacity: 1;
            }
        }

        .celebrate-title {
            animation: celebrateTitle 0.8s cubic-bezier(.34, 1.56, .64, 1) forwards;
        }

        @keyframes timeUpShake {

            0%,
            100% {
                transform: scale(1);
            }

            25% {
                transform: scale(1.05) rotate(-2deg);
            }

            75% {
                transform: scale(1.05) rotate(2deg);
            }
        }

        .time-up-icon {
            animation: timeUpShake 0.6s ease-in-out infinite;
        }

        /* 3초 카운트다운 관련 애니메이션 및 스타일 추가 */
        /* 숫자는 팝업 후 바로 페이드아웃 */
        @keyframes countPop {
            0% {
                transform: scale(0.6);
                opacity: 0;
            }

            35% {
                transform: scale(1.05);
                opacity: 1;
            }

            100% {
                transform: scale(1);
                opacity: 0;
            }
        }

        /* '시작!' 문구는 등장 후 제자리에 유지되다 퇴장 트랜지션과 맞물림 */
        @keyframes startPop {
            0% {
                transform: scale(0.6);
                opacity: 0;
            }

            25%,
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* 유리판 전체가 스르륵 부드럽게 페이드아웃되면서 멀어지는 연출 */
        @keyframes glassFadeOut {
            0% {
                opacity: 1;
                transform: scale(1);
                filter: blur(0px);
            }

            100% {
                opacity: 0;
                transform: scale(0.92);
                filter: blur(4px);
            }
        }

        .a-glass-fadeout {
            animation: glassFadeOut 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <script src="common.js"></script>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        /* Grid cell sizing — tuned to match 488px column width */
        const CELL = 66, GAP = 6, PAD = 14;
        const cellCenter = (r, c) => ({ x: PAD + c * (CELL + GAP) + CELL / 2, y: PAD + r * (CELL + GAP) + CELL / 2 });
        const GRID_INNER = PAD * 2 + 7 * (CELL + GAP) - GAP; // 14*2 + 7*66 - 6 = 472

        const WORD_DEFINITIONS = {
            '호랑이': { emoji: '🐯', meaning: '깊은 산속에 사는 크고 무서운 동물이에요.', detail: '옛이야기에서 호랑이는 무섭기도 하지만 때로는 어리석거나 친근하게 등장해요. 우리 옛이야기의 단골 주인공이지요!', color: '#E11D48' },
            '창호지': { emoji: '📜', meaning: '문에 바르는 얇고 하얀 종이예요.', detail: '옛날에는 문에 유리 대신 한지(창호지)를 발랐어요. 얇지만 바람을 막아주고, 햇빛이 은은하게 들어오게 해줘요.', color: '#7C3AED' },
            '산골집': { emoji: '🏠', meaning: '깊은 산속 외딴 곳에 있는 집이에요.', detail: '마을에서 떨어진 산속에 지어진 작고 소박한 집을 말해요. 자연 속에서 조용하게 살아가는 보금자리지요.', color: '#4361EE' },
            '감자': { emoji: '🥔', meaning: '땅속에서 자라는 둥글둥글한 먹거리예요.', detail: '추운 겨울이나 배고픈 시절에 든든하게 배를 채워주던 고마운 식량이에요. 화롯불에 구워 먹으면 정말 맛있답니다!', color: '#EA580C' },
            '남매': { emoji: '👫', meaning: '오빠(또는 남동생)와 누나(또는 여동생)를 함께 이르는 말이에요.', detail: '한 부모님 아래 태어난 남자아이와 여자아이를 말해요. 서로 아껴주고 지켜주는 따뜻한 사이지요.', color: '#D97706' },
            '부부': { emoji: '💑', meaning: '결혼한 남편과 아내를 함께 이르는 말이에요.', detail: '서로를 평생의 동반자로 약속한 두 사람을 말해요. 함께 가족을 이루고 서로 도우며 살아가지요.', color: '#DB2777' },
            '오빠': { emoji: '👦', meaning: '여동생이 자기보다 나이 많은 남자 형제를 부르는 말이에요.', detail: '동생을 든든하게 지켜주고 챙겨주는 든든한 존재예요. 이야기 속 오빠처럼 용감하게 동생을 보호하기도 해요!', color: '#0284C7' },
        };

        // 타이머의 시각적 형태와 애니메이션을 처리하는 컴포넌트입니다.
        function Timer({ seconds, isWarning }) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return (
                // 마지막 10초 이하(isWarning === true)일 때 'timer-warning' 애니메이션 클래스를 적용하여 타이머를 흔들거나 키웁니다.
                <div className={isWarning ? 'timer-warning' : ''} style={{
                    display: 'flex', alignItems: 'center', gap: 6,
                    // 마지막 10초가 남았을 때 배경색을 연하고 은은한 붉은 톤(#FEE2E2)으로 바꾸고, 평소에는 흰색(#FFF)을 유지합니다.
                    background: isWarning ? '#FEE2E2' : '#FFF',
                    padding: '10px 16px',
                    borderRadius: '18px',
                    fontFamily: 'var(--font-h)',
                    fontSize: 15,
                    fontWeight: 700,
                    // 마지막 10초가 남았을 때 글자색을 경고의 빨간색(#EF4444)으로 바꾸고, 평소에는 진한 남색(var(--navy-dark))으로 표현합니다.
                    color: isWarning ? '#EF4444' : 'var(--navy-dark)',
                    // 배경색과 글자색 등이 변경될 때 0.3초 동안 부드러운 애니메이션 효과(transition)를 줍니다.
                    transition: 'all 0.3s ease',
                    whiteSpace: 'nowrap'
                }}>
                    <span style={{ fontSize: 16, lineHeight: 1 }}>⏱️</span>
                    <span>{m.toString().padStart(2, '0')}:{s.toString().padStart(2, '0')}</span>
                </div>
            );
        }

        function WordDefinitionPopup({ word, onClose }) {
            const def = WORD_DEFINITIONS[word];
            if (!def) return null;
            return (
                <div style={{ position: 'fixed', inset: 0, background: 'rgba(15,23,42,0.55)', backdropFilter: 'blur(6px)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 300, padding: 20 }}
                    onClick={onClose}>
                    <div className="def-pop-in" onClick={e => e.stopPropagation()}
                        style={{ background: '#fff', borderRadius: 28, padding: '36px 32px', maxWidth: 440, width: '100%', boxShadow: '0 30px 80px rgba(15,23,42,0.3)', textAlign: 'center', position: 'relative', overflow: 'hidden' }}>
                        <div style={{ position: 'absolute', top: -40, right: -40, width: 140, height: 140, borderRadius: '50%', background: `radial-gradient(circle, ${def.color}30, transparent 70%)`, pointerEvents: 'none' }} />
                        <div style={{ display: 'inline-block', padding: '6px 16px', background: def.color + '15', color: def.color, borderRadius: 100, fontSize: 12, fontWeight: 800, letterSpacing: 1.5, marginBottom: 14 }}>
                            단어를 획득했어요!
                        </div>
                        <div style={{ fontSize: 56, marginBottom: 6, lineHeight: 1 }}>{def.emoji}</div>
                        <h2 className="font-h" style={{ fontSize: 34, color: def.color, marginBottom: 16, letterSpacing: -1 }}>{word}</h2>
                        <p style={{ fontSize: 17, color: 'var(--navy-dark)', lineHeight: 1.6, fontWeight: 700, marginBottom: 14, wordBreak: 'keep-all' }}>
                            {def.meaning}
                        </p>
                        <div style={{ background: '#F8FAFC', borderRadius: 16, padding: '16px 18px', marginBottom: 24, textAlign: 'left', borderLeft: `4px solid ${def.color}` }}>
                            <p style={{ fontSize: 13.5, color: 'var(--gray)', lineHeight: 1.7, margin: 0, fontWeight: 500, wordBreak: 'keep-all' }}>
                                {def.detail}
                            </p>
                        </div>
                        <button onClick={onClose} className="btn-primary" style={{ width: '100%', padding: '14px', fontSize: 16, background: `linear-gradient(135deg, ${def.color}, ${def.color}DD)`, boxShadow: `0 8px 24px ${def.color}50` }}>
                            계속하기 →
                        </button>
                    </div>
                </div>
            );
        }

        // 획득한 단어를 보여주는 팝업 컴포넌트입니다.
        function AcquiredPopup({ words, onNext, isAll }) {
            return (
                <div style={{ position: 'fixed', inset: 0, background: 'rgba(15, 23, 42, 0.6)', backdropFilter: 'blur(4px)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 200 }}>
                    <div className="a-slideup" style={{ background: 'var(--card-solid)', borderRadius: 32, padding: '48px 48px', maxWidth: 560, width: '90%', textAlign: 'center', boxShadow: 'var(--shadow-lg)' }}>
                        <div style={{ width: 170, height: 130, margin: '0 auto 24px', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                            <img src="img/cha_01_complete.png" alt="성공 캐릭터" style={{ maxWidth: '100%', maxHeight: '100%', objectFit: 'contain' }} />
                        </div>
                        <h2 className="font-h" style={{ fontSize: 36, color: 'var(--navy-dark)', marginBottom: 12 }}>
                            {/* 단어를 전부 다 모으지 못한 경우, 찾은 단어의 개수를 포함하여 동적으로 문구를 출력합니다. */}
                            {isAll ? '단어를 모두 모았어요!' : `단어를 ${words.length}개 모았어요!`}
                        </h2>
                        <p style={{ color: 'var(--gray)', fontSize: 16, marginBottom: 40, fontWeight: 500 }}>이 단어들로 이야기를 만들어봐요.</p>
                        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 12, justifyContent: 'center', marginBottom: 56 }}>
                            {words.map((w, i) => (
                                <span key={i} className="font-h a-pop" style={{ padding: '12px 28px', background: 'var(--primary-soft)', color: 'var(--primary)', borderRadius: 30, fontSize: 22, animationDelay: `${i * 80}ms` }}>{w}</span>
                            ))}
                        </div>
                        <button className="btn-primary" style={{ width: '100%', fontSize: 20, padding: '20px' }} onClick={onNext}>문장 플레이 시작 →</button>
                    </div>
                </div>
            );
        }

        function TimeUpPopup({ foundCount, onRetry, onContinue }) {
            return (
                <div style={{ position: 'fixed', inset: 0, background: 'rgba(15, 23, 42, 0.6)', backdropFilter: 'blur(4px)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 250 }}>
                    <div className="a-slideup" style={{ background: 'var(--card-solid)', borderRadius: 32, padding: '48px 40px', maxWidth: 480, width: '90%', textAlign: 'center', boxShadow: 'var(--shadow-lg)' }}>
                        <div style={{ width: 120, height: 120, margin: '0 auto 24px', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                            {/* 획득한 단어의 개수가 3개 이상이면 기본 포즈 캐릭터(img/cha_01.png)를 노출하고, 3개 미만이면 아쉬워하는 우는 캐릭터(img/cha_01_02.png)를 노출합니다. */}
                            <img src={foundCount >= 3 ? "img/cha_01.png" : "img/cha_01_02.png"} alt={foundCount >= 3 ? "기본 호랑이" : "아쉬워하는 호랑이"} style={{ maxWidth: '100%', maxHeight: '100%', objectFit: 'contain' }} />
                        </div>
                        <h2 className="font-h" style={{ fontSize: 32, color: 'var(--navy-dark)', marginBottom: 14 }}>시간이 다 되었어요!</h2>
                        <p style={{ color: 'var(--gray)', fontSize: 16, marginBottom: 10, fontWeight: 500 }}>
                            지금까지 <strong style={{ color: 'var(--primary)' }}>{foundCount}개</strong>의 단어를 찾았어요.
                        </p>
                        <p style={{ color: 'var(--gray)', fontSize: 16, marginBottom: 36, fontWeight: 500, lineHeight: 1.5 }}>
                            찾은 단어가 3개 이상이면 이야기 만들기를 할 수 있어요.
                        </p>
                        <div style={{ display: 'flex', gap: 12 }}>
                            <button onClick={onRetry} className="btn-primary" style={{ flex: 1, padding: '18px', fontSize: 16, fontWeight: 700 }}>↺ 다시 도전</button>
                            {foundCount >= 3 && (
                                <button onClick={onContinue} className="btn-primary" style={{ flex: 1, padding: '18px', fontSize: 16, fontWeight: 700 }}>다음 단계 진행 →</button>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        function GridScreen() {
            // 제한 시간을 기존 90초에서 1분(60초)으로 줄여서 설정합니다.
            const TOTAL_TIME = 60;

            // --- 3초 카운트다운 관련 상태 ---
            // 터치 시작 여부를 판단하는 countdownStarted는 제거하고, 화면 로드 시 바로 시작하도록 처리합니다.
            const [isStarting, setIsStarting] = useState(true); // 게임 시작 전 카운트다운 상태 여부 (초기값: true)
            const [countdown, setCountdown] = useState(3);       // 카운트다운 숫자 (3 -> 2 -> 1 -> 시작!)

            const [foundWords, setFoundWords] = useState([]);
            const [sel, setSel] = useState([]);
            const [anim, setAnim] = useState(null);
            const [particles, setParticles] = useState([]);
            const [hintCell, setHintCell] = useState(null);
            const [mascotMessage, setMascotMessage] = useState('드래그해서 숨은 단어를 찾아봐!');
            const [mascotImg, setMascotImg] = useState('img/cha_01.png');
            const [popup, setPopup] = useState(false);
            const [celebrating, setCelebrating] = useState(false);
            const [definitionWord, setDefinitionWord] = useState(null);
            const [timeLeft, setTimeLeft] = useState(TOTAL_TIME);
            const [timerActive, setTimerActive] = useState(false); // 카운트다운이 끝난 후 게임이 시작되어야 하므로 초기값은 false로 설정합니다.
            const [timeUpOpen, setTimeUpOpen] = useState(false);

            const gridRef = useRef(null);
            const draggingRef = useRef(false);
            const anchorRef = useRef(null);
            const animActiveRef = useRef(false);
            const selRef = useRef([]);
            const foundWordsRef = useRef(foundWords);
            useEffect(() => { foundWordsRef.current = foundWords; }, [foundWords]);

            const allFound = foundWords.length === window.GRID_DATA.targets.length;
            // 10초 이하로 남았을 때 빨간 글씨 경고와 펄스 애니메이션이 활성화되도록 기준을 10초로 수정합니다.
            const isWarning = timeLeft <= 10 && timerActive;

            // --- 3초 카운트다운 실행 로직 ---
            useEffect(() => {
                if (isStarting) {
                    if (countdown > 0) {
                        // 3, 2, 1 카운트다운이 진행될 때 "틱" 효과음을 재생합니다. (진입 즉시 바로 출력)
                        if (window.SoundEffects) {
                            window.SoundEffects.play('count');
                        }
                        // 1초 간격으로 숫자를 1씩 줄여나갑니다. (3 -> 2 -> 1)
                        const timer = setTimeout(() => setCountdown(countdown - 1), 1000);
                        return () => clearTimeout(timer);
                    } else if (countdown === 0) {
                        // "시작!" 문구가 나타날 때 맑은 시작음 효과음을 재생합니다.
                        if (window.SoundEffects) {
                            window.SoundEffects.play('start');
                        }
                        // '시작!' 텍스트가 화면에 노출되는 대기 시간 (1.1초)
                        const timer = setTimeout(() => setCountdown(-1), 1100);
                        return () => clearTimeout(timer);
                    } else {
                        // 유리판 퇴장 페이드아웃 애니메이션(0.4초)이 끝난 후 실제 게임을 시작합니다.
                        const timer = setTimeout(() => {
                            setIsStarting(false);     // 카운트다운 모드 종료
                            setTimerActive(true);     // 게임 메인 타이머 작동 시작
                        }, 400);
                        return () => clearTimeout(timer);
                    }
                }
            }, [countdown, isStarting]);

            // 기존 타이머 루프
            useEffect(() => {
                if (!timerActive || allFound) return;
                if (timeLeft <= 0) {
                    setTimerActive(false);
                    setTimeUpOpen(true);
                    return;
                }
                const id = setTimeout(() => setTimeLeft(t => t - 1), 1000);
                return () => clearTimeout(id);
            }, [timeLeft, timerActive, allFound]);

            useEffect(() => {
                if (allFound) setTimerActive(false);
            }, [allFound]);

            // --- 시간 임박 시 빠르게 째깍이는 사운드 재생 로직 ---
            useEffect(() => {
                if (!isWarning || !timerActive || allFound) return;
                
                const playWarningTick = () => {
                    if (window.SoundEffects) {
                        window.SoundEffects.play('warning_tick');
                    }
                };
                
                // 즉시 째깍 소리를 한 번 냅니다.
                playWarningTick();
                
                // 0.5초(500ms) 간격으로 빠르게 째깍이는 사운드를 반복 트리거합니다.
                const warningTickId = setInterval(playWarningTick, 500);
                
                return () => clearInterval(warningTickId);
            }, [isWarning, timerActive, allFound]);

            useEffect(() => {
                if (celebrating) {
                    if (window.SoundEffects) {
                        window.SoundEffects.play('correct');
                        // 파티클 폭죽과 싱크를 맞추어 "예~" 하고 기뻐하는 어린이 환호소리를 추가로 들려줍니다.
                        window.SoundEffects.play('cheer');
                    }
                    window.AppState.set('acquired', [...new Set(foundWords)]);

                    if (typeof confetti === 'function') {
                        const festiveColors = [
                            '#FF2E93', // 선명한 핫핑크
                            '#FF70A6', // 밝은 네온 핑크
                            '#A255FF', // 쨍한 바이올렛 보라
                            '#00F5FF', // 형광 스카이 시안
                            '#38EF7D', // 쨍한 네온 연두
                            '#A6FF96', // 밝은 형광 연두
                            '#FFE600', // 쨍한 형광 옐로우
                            '#FFFB73', // 밝은 레몬 옐로우
                            '#FF9F29', // 포인트 오렌지
                            '#4D96FF'  // 비비드 블루
                        ];

                        // 1. 중앙 폭죽
                        confetti({
                            particleCount: 60,
                            spread: 100,
                            origin: { x: 0.5, y: 0.4 },
                            zIndex: 9999,
                            colors: festiveColors
                        });

                        // 2. 좌측 하단 폭죽
                        confetti({
                            particleCount: 40,
                            angle: 60,
                            spread: 70,
                            origin: { x: 0.05, y: 0.8 },
                            zIndex: 9999,
                            colors: festiveColors
                        });

                        // 3. 우측 하단 폭죽
                        confetti({
                            particleCount: 40,
                            angle: 120,
                            spread: 70,
                            origin: { x: 0.95, y: 0.8 },
                            zIndex: 9999,
                            colors: festiveColors
                        });

                        const duration = 3000;
                        const end = Date.now() + duration;

                        // 4. 화면 가득 흩날림 효과 (모든 컬러 골고루)
                        const frame = () => {
                            const randomColor = festiveColors[Math.floor(Math.random() * festiveColors.length)];
                            confetti({
                                particleCount: 2,
                                angle: 270,
                                spread: 360,
                                ticks: 200,
                                gravity: 0.55,
                                scalar: 0.8,
                                startVelocity: 0,
                                origin: { x: Math.random(), y: Math.random() - 0.2 },
                                zIndex: 9999,
                                colors: [randomColor]
                            });

                            if (Date.now() < end) {
                                requestAnimationFrame(frame);
                            }
                        };
                        frame();
                    }

                    const timer = setTimeout(() => {
                        setPopup(true);
                    }, 3000);
                    return () => clearTimeout(timer);
                }
            }, [celebrating]);

            const foundMap = {};
            window.GRID_DATA.targets.forEach(t => {
                if (foundWords.includes(t.word)) t.cells.forEach(([r, c]) => { foundMap[`${r}-${c}`] = t; });
            });

            const inSel = (r, c) => sel.some(([sr, sc]) => sr === r && sc === c);

            const getCellAt = (x, y) => {
                if (!gridRef.current) return null;
                for (const el of gridRef.current.querySelectorAll('[data-rc]')) {
                    const rect = el.getBoundingClientRect();
                    if (x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom) {
                        return el.dataset.rc.split(',').map(Number);
                    }
                }
                return null;
            };

            const triggerHit = (newSel, hit) => {
                if (window.SoundEffects) window.SoundEffects.play('correct');
                const startP = cellCenter(newSel[0][0], newSel[0][1]);
                const endP = cellCenter(newSel[newSel.length - 1][0], newSel[newSel.length - 1][1]);
                const key = Date.now();
                setAnim({ start: startP, end: endP, color: hit.color, key });
                animActiveRef.current = true;
                const burst = [];
                for (let i = 0; i < 14; i++) {
                    const ang = Math.random() * Math.PI * 2;
                    const dist = 30 + Math.random() * 45;
                    burst.push({ id: key + '-' + i, x: endP.x, y: endP.y, dx: Math.cos(ang) * dist, dy: Math.sin(ang) * dist, color: hit.color });
                }
                setParticles(p => [...p, ...burst]);
                setTimeout(() => setParticles(p => p.filter(pa => !pa.id.startsWith(key + '-'))), 900);
                setFoundWords(p => [...p, hit.word]);
                draggingRef.current = false;
                anchorRef.current = null;
                selRef.current = [];
                const msgs = ['우와, 단어를 찾았어! 🎉', '정말 멋진 실력이야! 👍', '대단해! 맞았어! ✨', '찾았다! 잘했어! 😍'];
                setMascotMessage(msgs[Math.floor(Math.random() * msgs.length)]);
                setMascotImg('img/cha_01_01.png'); // 긍정 피드백 이미지 교체
                setTimeout(() => {
                    setSel([]); setAnim(null); animActiveRef.current = false;
                    setDefinitionWord(hit.word);
                    setMascotImg('img/cha_01.png'); // 팝업 열릴 때 캐릭터 원상복구
                }, 900);
            };

            const computeFreeLine = (ar, ac, r, c) => {
                if (r === ar && c === ac) return [[ar, ac]];
                const rawDr = r - ar, rawDc = c - ac;
                const adDr = Math.abs(rawDr), adDc = Math.abs(rawDc);
                let dr, dc, n;
                if (adDr === 0) { dr = 0; dc = Math.sign(rawDc); n = adDc; }
                else if (adDc === 0) { dr = Math.sign(rawDr); dc = 0; n = adDr; }
                else if (adDr === adDc) { dr = Math.sign(rawDr); dc = Math.sign(rawDc); n = adDr; }
                else {
                    const ratio = adDr / adDc;
                    if (ratio < 0.4142) { dr = 0; dc = Math.sign(rawDc); n = adDc; }
                    else if (ratio > 2.414) { dr = Math.sign(rawDr); dc = 0; n = adDr; }
                    else { dr = Math.sign(rawDr); dc = Math.sign(rawDc); n = Math.max(adDr, adDc); }
                }
                const cells = [];
                for (let i = 0; i <= n && i < 7; i++) {
                    const nr = ar + dr * i, nc = ac + dc * i;
                    if (nr < 0 || nr >= 7 || nc < 0 || nc >= 7) break;
                    cells.push([nr, nc]);
                }
                return cells;
            };

            const handleMove = (cx, cy) => {
                if (!draggingRef.current || !anchorRef.current || animActiveRef.current) return;
                const cell = getCellAt(cx, cy);
                if (!cell) return;
                const [r, c] = cell;
                const [ar, ac] = anchorRef.current;
                const newSel = computeFreeLine(ar, ac, r, c);
                selRef.current = newSel;
                setSel(newSel);
            };

            const endDrag = () => {
                if (animActiveRef.current) return;
                draggingRef.current = false;
                const cur = selRef.current;
                if (cur.length >= 2) {
                    const word = cur.map(([sr, sc]) => window.GRID_DATA.cells[sr][sc]).join('');
                    const hit = window.GRID_DATA.targets.find(t => t.word === word && !foundWordsRef.current.includes(t.word));
                    if (hit) { triggerHit(cur, hit); return; }
                    // 단어 매칭 실패 시 오답음 재생
                    if (window.SoundEffects) window.SoundEffects.play('wrong');
                }
                anchorRef.current = null;
                selRef.current = [];
                setSel([]);
            };

            const startDrag = (r, c) => {
                // [수정] 카운트다운 시작 중(isStarting === true)이거나 타이머가 시작되기 전에는 터치/드래그 조작을 할 수 없도록 리턴합니다.
                if (animActiveRef.current || !timerActive || isStarting) return;
                if (window.SoundEffects) window.SoundEffects.play('click');
                draggingRef.current = true;
                anchorRef.current = [r, c];
                const init = [[r, c]];
                selRef.current = init;
                setSel(init);
            };

            const showHint = (target) => {
                // [수정] 카운트다운 진행 중(isStarting === true)에는 힌트 보기 버튼 상호작용을 차단합니다.
                if (isStarting) return;
                if (foundWords.includes(target.word)) return;
                if (window.SoundEffects) window.SoundEffects.play('click');
                setHintCell(target.cells[0]);
                const msgs = ['여기 힌트를 보여줄게! 💡', '어디 숨었나 잘 봐봐! 👀', '이 글자부터 시작이야! 🌟'];
                setMascotMessage(msgs[Math.floor(Math.random() * msgs.length)]);
                setTimeout(() => setHintCell(null), 2000);
            };

            const linePoints = sel.map(([r, c]) => { const p = cellCenter(r, c); return `${p.x},${p.y}`; }).join(' ');

            const handleDefClose = () => {
                setDefinitionWord(null);
                if (allFound) {
                    setCelebrating(true);
                }
            };

            const handleNext = () => {
                if (window.SoundEffects) window.SoundEffects.play('click');
                location.href = 'step2.html';
            };
            const handleRetry = () => {
                if (window.SoundEffects) window.SoundEffects.play('reset');
                setTimeout(() => location.reload(), 150);
            };
            const handleContinueAnyway = () => {
                if (window.SoundEffects) window.SoundEffects.play('click');
                setTimeUpOpen(false);
                if (foundWords.length === 0) return;
                window.AppState.set('acquired', [...new Set(foundWords)]);
                setPopup(true);
            };

            const progressPct = (foundWords.length / window.GRID_DATA.targets.length) * 100;

            return (
                <>
                    {/* --- [추정 피드백 반영] 다채로운 유색 글로우 대신 깔끔하게 떨어지는 소프트 블랙 섀도우 조합이 반영된 3초 카운트다운 오버레이 UI --- */}
                    {isStarting && countdown >= -1 && (
                        <div style={{
                            position: 'fixed', inset: 0, zIndex: 9999, display: 'flex',
                            alignItems: 'center', justifyContent: 'center',
                            background: 'transparent', pointerEvents: 'none'
                        }}>
                            {/* 유리창 영역 (Glassmorphism 스타일) */}
                            <div
                                className={countdown === -1 ? 'a-glass-fadeout' : ''}
                                style={{
                                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                                    width: 320, height: 320,
                                    borderRadius: '60px',
                                    background: 'rgba(255, 255, 255, 0.2)',
                                    backdropFilter: 'blur(10px)',
                                    border: '1px solid rgba(255, 255, 255, 0.55)',

                                    // 흐릿하고 뿌연 오라 효과 대신 외곽선을 깔끔하게 떨어뜨려 입체감을 극대화한 정석 그림자 설계 (step1-cross의 피드백 반영)
                                    boxShadow: `
                                        0 4px 24px rgba(15, 23, 42, 0.05),     /* 얇고 정교한 밀착 음영 */
                                        0 25px 60px rgba(15, 23, 42, 0.12),    /* 공중에 바짝 띄워주는 깊은 외부 그림자 */
                                        inset 0 1px 1px rgba(255, 255, 255, 0.85) /* 상단 유리 절단면 하이라이트 */
                                    `,
                                    overflow: 'hidden'
                                }}
                            >
                                {/* 내부 텍스트 전환 영역 */}
                                {countdown <= 0 ? (
                                    <div key="start" style={{
                                        fontSize: 110,
                                        fontWeight: 600,
                                        color: '#2ab1a3',
                                        animation: 'startPop 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                                        fontFamily: 'var(--font-h)',
                                        letterSpacing: '0.04em',
                                        paddingLeft: '0.04em'
                                    }}>
                                        시작!
                                    </div>
                                ) : (
                                    <div key={countdown} style={{
                                        fontSize: 150,
                                        fontWeight: 600,
                                        color: 'var(--primary)',
                                        animation: 'countPop 1.0s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                                        fontFamily: 'var(--font-h)',
                                        letterSpacing: '-0.03em'
                                    }}>
                                        {countdown}
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    <div className="a-fadeup" style={{ padding: '0px', paddingTop: 20, position: 'relative' }}>

                        {/* Header: Title + Progress */}
                        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 24, flexWrap: 'wrap' }}>
                            <div style={{ width: 320, maxWidth: 320, padding: '0 10px' }}>
                                <div style={{ display: 'flex', alignItems: 'center', gap: 16, marginBottom: 4 }}>
                                    <h2 className="font-h" style={{ fontSize: 24, color: 'var(--navy-dark)', margin: 0 }}>글자 연결</h2>
                                    <div className="font-h" style={{ fontSize: 15, color: 'var(--gray)', flexGrow: 1, textAlign: 'right' }}>
                                        <span style={{ color: 'var(--primary)' }}>{foundWords.length}</span> / {window.GRID_DATA.targets.length}
                                    </div>
                                </div>
                                <div style={{ height: 6, background: 'var(--gray-light)', borderRadius: 3, overflow: 'hidden', width: '100%' }}>
                                    <div style={{ height: '100%', background: 'var(--primary)', borderRadius: 3, width: `${progressPct}%`, transition: 'width .6s cubic-bezier(0.16,1,0.3,1)' }} />
                                </div>
                            </div>
                        </div>

                        {/* TIMER Box */}
                        <div style={{
                            position: 'absolute', left: 344, top: 15, display: 'flex', alignItems: 'center', gap: 6,
                            zIndex: 50
                        }}>
                            <Timer seconds={timeLeft} isWarning={isWarning} />
                        </div>

                        {/* RIGHT: Mascot with Speech Bubble */}
                        <div style={{ position: 'absolute', right: 0, top: 10, display: 'flex', alignItems: 'flex-start', justifyContent: 'flex-end', gap: 0, zIndex: 50 }}>
                            <div className="a-pop" key={mascotMessage} style={{
                                background: '#FFF', padding: '10px 14px', borderRadius: '18px',
                                boxShadow: '0 6px 16px rgba(0,0,0,0.06)', border: '2px solid var(--primary-soft)',
                                fontSize: 15, fontWeight: 600, color: '#475569', whiteSpace: 'nowrap',
                                position: 'relative', marginTop: 5, display: 'flex', alignItems: 'center', gap: 6
                            }}>
                                <span>{mascotMessage}</span>
                                <div style={{
                                    position: 'absolute', right: -6, top: '50%',
                                    width: 10, height: 10, background: '#FFF',
                                    borderRight: '2px solid var(--primary-soft)',
                                    borderTop: '2px solid var(--primary-soft)',
                                    transform: 'translateY(-50%) rotate(45deg)', zIndex: 1
                                }}></div>
                            </div>
                            <div style={{ width: 120, height: 140, display: 'flex', alignItems: 'flex-end', justifyContent: 'center', flexShrink: 0, marginRight: 0 }}>
                                <img src={mascotImg} alt="" style={{ maxWidth: '100%', maxHeight: '100%', objectFit: 'contain', filter: 'drop-shadow(0 6px 12px rgba(0,0,0,0.1))' }} />
                            </div>
                        </div>

                        {/* Main Layout: LEFT (Hints) + RIGHT (Puzzle Grid) */}
                        <div style={{ display: 'flex', gap: 24, alignItems: 'stretch', flexWrap: 'wrap', marginTop: 10, position: 'relative', zIndex: 1 }}>

                            {/* LEFT: Word List (White Card) */}
                            <div style={{ width: 320, flexShrink: 0, background: 'var(--card-solid)', borderRadius: 28, padding: '28px 24px', boxShadow: '0 10px 40px rgba(79,70,229,0.06)' }}>
                                <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                                    {window.GRID_DATA.targets.map(t => {
                                        const found = foundWords.includes(t.word);
                                        return (
                                            <div key={t.word} className={found ? 'a-pop' : ''}
                                                style={{
                                                    display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '16px 18px', borderRadius: 14,
                                                    background: found ? t.bg : '#F8FAFC',
                                                    border: `2px solid ${found ? t.color + '40' : 'transparent'}`,
                                                    transition: 'all .25s ease',
                                                    boxShadow: found ? `0 4px 12px ${t.color}15` : 'none',
                                                    opacity: found ? 0.35 : 1,
                                                }}
                                                onMouseEnter={e => { if (!found) e.currentTarget.style.background = '#F1F5F9'; }}
                                                onMouseLeave={e => { if (!found) e.currentTarget.style.background = '#F8FAFC'; }}>
                                                <div style={{ display: 'flex', alignItems: 'center' }}>
                                                    <span style={{ fontSize: 13, color: '#94A3B8', marginRight: 10, fontWeight: 600 }}>{t.label}</span>
                                                    <span className="font-h" style={{ fontSize: 18, color: found ? t.color : 'var(--navy-dark)' }}>{t.word}</span>
                                                </div>
                                                {found
                                                    ? <span style={{ color: t.color, fontWeight: 800, fontSize: 18 }}>✓</span>
                                                    : <button onClick={() => showHint(t)}
                                                        style={{ fontSize: 12, fontWeight: 700, padding: '6px 12px', borderRadius: 10, border: 'none', background: '#FEF08A', color: 'var(--navy-dark)', cursor: 'pointer', fontFamily: 'var(--font-b)' }}
                                                        onMouseEnter={e => { e.currentTarget.style.background = '#FDE047'; }}
                                                        onMouseLeave={e => { e.currentTarget.style.background = '#FEF08A'; }}>
                                                        💡 힌트
                                                    </button>}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>

                            {/* RIGHT: Grid Board */}
                            <div style={{ flex: 1, minWidth: 0, display: 'flex', flexDirection: 'column', gap: 18 }}>
                                <div style={{ background: 'var(--card-solid)', borderRadius: 28, padding: '32px', display: 'flex', justifyContent: 'center', position: 'relative', boxShadow: '0 10px 40px rgba(79,70,229,0.06)' }}>
                                    <div style={{ position: 'relative', width: 488, boxSizing: 'border-box' }}>
                                        <div ref={gridRef}
                                            onMouseMove={e => handleMove(e.clientX, e.clientY)}
                                            onMouseUp={endDrag} onMouseLeave={endDrag}
                                            onTouchMove={e => { e.preventDefault(); const t = e.touches[0]; handleMove(t.clientX, t.clientY); }}
                                            onTouchEnd={endDrag}
                                            style={{ display: 'grid', gridTemplateColumns: `repeat(7,${CELL}px)`, gap: GAP, padding: PAD, touchAction: 'none', position: 'relative', zIndex: 1, justifyContent: 'center' }}>
                                            {window.GRID_DATA.cells.map((row, r) => row.map((ch, c) => {
                                                const s = inSel(r, c), f = foundMap[`${r}-${c}`];
                                                return (
                                                    <div key={`${r}-${c}`} data-rc={`${r},${c}`}
                                                        onMouseDown={() => startDrag(r, c)}
                                                        onTouchStart={e => { e.preventDefault(); startDrag(r, c); }}
                                                        style={{
                                                            width: CELL, height: CELL, display: 'flex', alignItems: 'center', justifyContent: 'center',
                                                            borderRadius: 14, cursor: timerActive ? 'pointer' : 'not-allowed',
                                                            fontFamily: 'var(--font-h)', fontWeight: 700, fontSize: 22,
                                                            transition: 'all .2s cubic-bezier(0.16,1,0.3,1)',
                                                            background: s ? 'rgba(52,211,153,.15)' : f ? f.bg : '#F8FAFC',
                                                            color: s ? 'var(--navy-dark)' : f ? f.color : 'var(--navy)',
                                                            border: `2px solid ${s ? 'var(--green-line)' : f ? f.color + '60' : 'transparent'}`,
                                                            transform: s ? 'scale(.92)' : 'scale(1)',
                                                            boxShadow: f ? `0 4px 12px ${f.color}25` : 'none',
                                                            opacity: !timerActive && !f ? 0.5 : 1,
                                                            animation: (hintCell && hintCell[0] === r && hintCell[1] === c) ? 'hintBlink .6s ease-in-out 3' : 'none',
                                                        }}>{ch}</div>
                                                );
                                            }))}
                                        </div>

                                        <svg width={GRID_INNER} height={GRID_INNER} style={{ position: 'absolute', top: 8, left: '50%', transform: 'translateX(-50%)', pointerEvents: 'none', zIndex: 3 }}>
                                            {sel.length >= 2 && <polyline points={linePoints} fill="none" stroke="var(--green-line)" strokeWidth="12" strokeLinecap="round" strokeLinejoin="round" opacity="0.6" />}
                                            {sel.map(([r, c], i) => { const p = cellCenter(r, c); return <circle key={i} cx={p.x} cy={p.y} r="7" fill="var(--green-line)" opacity="0.9" />; })}
                                            {particles.map(p => (
                                                <circle key={p.id} cx={p.x} cy={p.y} r="6" fill={p.color}
                                                    style={{ animation: `particle-${p.id} .85s cubic-bezier(0.16,1,0.3,1) forwards`, '--dx': p.dx + 'px', '--dy': p.dy + 'px' }} />
                                            ))}
                                        </svg>

                                        {anim && (
                                            <img src="img/character_02.png" alt="" key={anim.key}
                                                style={{ position: 'absolute', left: `calc(50% - ${GRID_INNER / 2}px + ${anim.start.x - 30}px)`, top: 8 + anim.start.y - 30, width: 60, height: 60, pointerEvents: 'none', zIndex: 5, animation: 'rideLine .8s cubic-bezier(.34,1.56,.64,1) forwards', '--tx': (anim.end.x - anim.start.x) + 'px', '--ty': (anim.end.y - anim.start.y) + 'px' }} />
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>

                        <style>{`
              ${particles.map(p => `@keyframes particle-${p.id}{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0}}`).join('\n')}
            `}</style>
                    </div>

                    {definitionWord && <WordDefinitionPopup word={definitionWord} onClose={handleDefClose} />}
                    {popup && <AcquiredPopup words={[...new Set(foundWords)]} onNext={handleNext} isAll={[...new Set(foundWords)].length === window.GRID_DATA.targets.length} />}
                    {timeUpOpen && <TimeUpPopup foundCount={foundWords.length} onRetry={handleRetry} onContinue={handleContinueAnyway} />}
                </>
            );
        }

        // 전체 메인 앱 컴포넌트
        function App() {
            useEffect(() => {
                // 게임 화면이 나타나면 새로운 BGM(Neon Conveyorbelts.mp3)을 재생합니다.
                if (window.SoundEffects) {
                    window.SoundEffects.playBGM("sound/Neon Conveyorbelts.mp3");
                }
                // 페이지를 벗어날 때는 배경음악을 정지합니다.
                return () => {
                    if (window.SoundEffects) {
                        window.SoundEffects.stopBGM();
                    }
                };
            }, []);

            return (
                <div style={{ minHeight: '100vh', background: 'linear-gradient(145deg,#EEF2FF 0%,#F8FAFC 45%,#FFF0F8 100%)' }}>
                    <window.StepHeader stepIdx={0} />
                    <div style={{ maxWidth: 1376, margin: '0 auto', padding: '0 32px' }}>
                        <GridScreen />
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

</html>
