<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>빈칸 맞추기 · 방아 찧는 호랑이</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="common.css" />
    <style>
        /* 오답 클릭 시 셀 흔들기 (강한 shake) */
        @keyframes cellWrongShake {

            0%,
            100% {
                transform: translateX(0) scale(1.15);
            }

            15% {
                transform: translateX(-8px) scale(1.15);
            }

            30% {
                transform: translateX(8px) scale(1.15);
            }

            45% {
                transform: translateX(-6px) scale(1.15);
            }

            60% {
                transform: translateX(6px) scale(1.15);
            }

            75% {
                transform: translateX(-3px) scale(1.15);
            }

            90% {
                transform: translateX(3px) scale(1.15);
            }
        }

        .a-cell-wrong-shake {
            animation: cellWrongShake 0.5s ease-in-out;
        }

        /* 오답 클릭 시 빨간 플래시 효과 */
        @keyframes redFlash {

            0%,
            100% {
                background: #C4B9A9;
                border-color: #B0A595;
            }

            50% {
                background: #FCA5A5;
                border-color: #DC2626;
                box-shadow: 0 0 0 4px rgba(220, 38, 38, 0.2);
            }
        }

        .a-red-flash {
            animation: redFlash 0.5s ease-in-out;
        }

        /* X 표시 페이드 효과 */
        @keyframes xMarkPop {
            0% {
                transform: translate(-50%, -50%) scale(0) rotate(-180deg);
                opacity: 0;
            }

            40% {
                transform: translate(-50%, -50%) scale(1.4) rotate(0deg);
                opacity: 1;
            }

            70% {
                transform: translate(-50%, -50%) scale(1) rotate(0deg);
                opacity: 1;
            }

            100% {
                transform: translate(-50%, -50%) scale(1.2) rotate(0deg);
                opacity: 0;
            }
        }

        .a-x-mark-pop {
            animation: xMarkPop 0.6s ease-out forwards;
        }

        /* 타이머 경고 애니메이션 */
        @keyframes timerPulse {

            0%,
            100% {
                transform: scale(1);
                color: #DC2626;
            }

            50% {
                transform: scale(1.1);
                color: #EF4444;
            }
        }

        .timer-warning {
            animation: timerPulse 0.8s ease-in-out infinite;
        }

        .x-mark {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            color: #DC2626;
            font-weight: 900;
            pointer-events: none;
            animation: xMarkPop 0.7s cubic-bezier(.36, .07, .19, .97) forwards;
            z-index: 20;
            text-shadow: 0 2px 8px rgba(220, 38, 38, 0.4);
        }

        /* 퍼즐 알맹이들(Grid)만 흔들리도록 애니메이션 지정 */
        @keyframes gridPiecesShake {

            0%,
            100% {
                transform: translateX(0);
            }

            20% {
                transform: translateX(-4px);
            }

            40% {
                transform: translateX(4px);
            }

            60% {
                transform: translateX(-2px);
            }

            80% {
                transform: translateX(2px);
            }
        }

        .a-grid-shake {
            animation: gridPiecesShake 0.3s ease-in-out;
        }

        /* 10초 이상 정체 시 하단 키보드 정답 카드가 부드럽게 깜빡거리는 힌트 애니메이션 */
        @keyframes subtleBlink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }
        }

        .a-subtle-blink {
            animation: subtleBlink 1.4s ease-in-out infinite;
        }

        /* 숫자는 팝업 후 바로 페이드아웃 */
        @keyframes countPop {
            0% {
                transform: scale(0.6);
                opacity: 0;
            }

            35% {
                transform: scale(1.05);
                opacity: 1;
            }

            100% {
                transform: scale(1);
                opacity: 0;
            }
        }

        /* '시작!' 문구는 등장 후 제자리에 유지되다 퇴장 트랜지션과 맞물림 */
        @keyframes startPop {
            0% {
                transform: scale(0.6);
                opacity: 0;
            }

            25%,
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* 유리판 전체가 스르륵 부드럽게 페이드아웃되면서 멀어지는 연출 */
        @keyframes glassFadeOut {
            0% {
                opacity: 1;
                transform: scale(1);
                filter: blur(0px);
            }

            100% {
                opacity: 0;
                transform: scale(0.92);
                filter: blur(4px);
            }
        }

        .a-glass-fadeout {
            animation: glassFadeOut 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <script src="common.js"></script>
    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        // 타이머 컴포넌트
        function Timer({ seconds, isWarning }) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return (
                <div className={isWarning ? 'timer-warning' : ''} style={{
                    display: 'flex', alignItems: 'center', gap: 6,
                    background: isWarning ? '#FEE2E2' : '#FFF',
                    padding: '10px 16px',
                    borderRadius: '18px',
                    fontFamily: 'var(--font-h)',
                    fontSize: 15,
                    fontWeight: 700,
                    color: isWarning ? '#EF4444' : 'var(--navy-dark)',
                    transition: 'all 0.3s ease',
                    whiteSpace: 'nowrap'
                }}>
                    <span style={{ fontSize: 16, lineHeight: 1 }}>⏱️</span>
                    <span>{m.toString().padStart(2, '0')}:{s.toString().padStart(2, '0')}</span>
                </div>
            );
        }

        // 단어 획득 팝업 컴포넌트
        function AcquiredPopup({ words, onNext, isAll }) {
            return (
                <div style={{ position: 'fixed', inset: 0, background: 'rgba(15, 23, 42, 0.6)', backdropFilter: 'blur(4px)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 200 }}>
                    <div className="a-slideup" style={{ background: 'var(--card-solid)', borderRadius: 32, padding: '48px 48px', maxWidth: 560, width: '90%', textAlign: 'center', boxShadow: 'var(--shadow-lg)' }}>
                        <div style={{ width: 120, height: 120, margin: '0 auto 24px', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                            <img src="img/cha_02_02.png" alt="기뻐하는 호랑이" style={{ maxWidth: '100%', maxHeight: '100%', objectFit: 'contain' }} />
                        </div>
                        <h2 className="font-h" style={{ fontSize: 36, color: 'var(--navy-dark)', marginBottom: 12 }}>
                            {isAll ? '단어를 모두 모았어요!' : `단어를 ${words.length}개 모았어요!`}
                        </h2>
                        <p style={{ color: 'var(--gray)', fontSize: 16, marginBottom: 40, fontWeight: 500 }}>이 단어들로 이야기를 만들어봐요.</p>
                        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 12, justifyContent: 'center', marginBottom: 56 }}>
                            {words.map((w, i) => (
                                <span key={i} className="font-h a-pop" style={{ padding: '12px 28px', background: 'var(--primary-soft)', color: 'var(--primary)', borderRadius: 30, fontSize: 22, animationDelay: `${i * 80}ms` }}>{w}</span>
                            ))}
                        </div>
                        <button className="btn-primary" style={{ width: '100%', fontSize: 20, padding: '20px' }} onClick={onNext}>문장 플레이 시작 →</button>
                    </div>
                </div>
            );
        }

        // 시간 초과 팝업 컴포넌트
        function TimeUpPopup({ foundCount, onRetry, onContinue }) {
            return (
                <div style={{ position: 'fixed', inset: 0, background: 'rgba(15, 23, 42, 0.6)', backdropFilter: 'blur(4px)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 250 }}>
                    <div className="a-slideup" style={{ background: 'var(--card-solid)', borderRadius: 32, padding: '48px 40px', maxWidth: 480, width: '90%', textAlign: 'center', boxShadow: 'var(--shadow-lg)' }}>
                        <div style={{ width: 120, height: 120, margin: '0 auto 24px', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                            <img src={foundCount >= 3 ? "img/cha_02.png" : "img/cha_02_01.png"} alt={foundCount >= 3 ? "기본 호랑이" : "아쉬워하는 호랑이"} style={{ maxWidth: '100%', maxHeight: '100%', objectFit: 'contain' }} />
                        </div>
                        <h2 className="font-h" style={{ fontSize: 32, color: 'var(--navy-dark)', marginBottom: 14 }}>시간이 다 되었어요!</h2>
                        <p style={{ color: 'var(--gray)', fontSize: 16, marginBottom: 10, fontWeight: 500 }}>
                            지금까지 <strong style={{ color: 'var(--primary)' }}>{foundCount}개</strong>의 단어를 찾았어요.
                        </p>
                        <p style={{ color: 'var(--gray)', fontSize: 16, marginBottom: 36, fontWeight: 500, lineHeight: 1.5 }}>
                            찾은 단어가 3개 이상이면 이야기 만들기를 할 수 있어요.
                        </p>
                        <div style={{ display: 'flex', gap: 12 }}>
                            <button onClick={onRetry} className="btn-primary" style={{ flex: 1, padding: '18px', fontSize: 16, fontWeight: 700 }}>↺ 다시 도전</button>
                            {foundCount >= 3 && (
                                <button onClick={onContinue} className="btn-primary" style={{ flex: 1, padding: '18px', fontSize: 16, fontWeight: 700 }}>다음 단계 진행 →</button>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        function CrossScreen() {
            const TOTAL_TIME = 60;

            // --- 3초 카운트다운 관련 상태 ---
            const [isStarting, setIsStarting] = useState(true);
            const [countdown, setCountdown] = useState(3);

            const [filled, setFilled] = useState({});
            const [usedCards, setUsedCards] = useState([]);
            const [wrongId, setWrongId] = useState(null);
            const [justId, setJustId] = useState(null);
            const [activeId, setActiveId] = useState(null);
            const [wrongKeyId, setWrongKeyId] = useState(null);
            const [mascotMessage, setMascotMessage] = useState('빈칸에 들어갈 단어를 눌러줘!');
            const [mascotImg, setMascotImg] = useState('img/cha_02.png');
            const [popup, setPopup] = useState(false);
            const [timeLeft, setTimeLeft] = useState(TOTAL_TIME);
            const [timerActive, setTimerActive] = useState(false);
            const [timeUpOpen, setTimeUpOpen] = useState(false);
            const [showXMark, setShowXMark] = useState(null);
            const [gridShake, setGridShake] = useState(false);
            const [idleSeconds, setIdleSeconds] = useState(0);
            const [showCardHint, setShowCardHint] = useState(false);
            const xMarkKeyRef = useRef(0);

            const CW = window.CW;
            const blanks = CW.cells.filter(c => c?.kind === 'blank');
            const allFilled = Object.keys(filled).length === blanks.length;
            const isWarning = timeLeft <= 10 && timerActive;

            // --- 카운트다운 로직 ---
            useEffect(() => {
                if (isStarting) {
                    if (countdown > 0) {
                        const timer = setTimeout(() => setCountdown(countdown - 1), 1000);
                        return () => clearTimeout(timer);
                    } else if (countdown === 0) {
                        // '시작!' 텍스트가 화면에 머무는 시간 조정
                        const timer = setTimeout(() => setCountdown(-1), 1100);
                        return () => clearTimeout(timer);
                    } else {
                        // 퇴장 애니메이션 완료 시간(0.4초) 확보 후 진짜 제거
                        const timer = setTimeout(() => {
                            setIsStarting(false);
                            setTimerActive(true);
                        }, 400);
                        return () => clearTimeout(timer);
                    }
                }
            }, [countdown, isStarting]);

            // 기존 타이머 루프
            useEffect(() => {
                if (!timerActive || allFilled) return;
                if (timeLeft <= 0) {
                    setTimerActive(false);
                    setTimeUpOpen(true);
                    return;
                }
                const id = setTimeout(() => {
                    setTimeLeft(t => t - 1);
                    setIdleSeconds(prev => prev + 1);
                }, 1000);
                return () => clearTimeout(id);
            }, [timeLeft, timerActive, allFilled]);

            useEffect(() => {
                if (allFilled) setTimerActive(false);
            }, [allFilled]);

            useEffect(() => {
                if (idleSeconds >= 10) {
                    setShowCardHint(true);
                } else {
                    setShowCardHint(false);
                }
            }, [idleSeconds]);

            useEffect(() => {
                if (allFilled) {
                    window.AppState.set('acquired', Object.values(CW.wordMap));
                    if (window.SoundEffects) {
                        window.SoundEffects.play('correct');
                        window.SoundEffects.play('cheer');
                    }

                    if (typeof confetti === 'function') {
                        const festiveColors = ['#FF2E93', '#FF70A6', '#A255FF', '#00F5FF', '#38EF7D', '#A6FF96', '#FFE600', '#FFFB73', '#FF9F29', '#4D96FF'];
                        confetti({ particleCount: 60, spread: 100, origin: { x: 0.5, y: 0.4 }, zIndex: 9999, colors: festiveColors });
                        confetti({ particleCount: 40, angle: 60, spread: 70, origin: { x: 0.05, y: 0.8 }, zIndex: 9999, colors: festiveColors });
                        confetti({ particleCount: 40, angle: 120, spread: 70, origin: { x: 0.95, y: 0.8 }, zIndex: 9999, colors: festiveColors });

                        const duration = 3000;
                        const end = Date.now() + duration;
                        const frame = () => {
                            const randomColor = festiveColors[Math.floor(Math.random() * festiveColors.length)];
                            confetti({ particleCount: 2, angle: 270, spread: 360, ticks: 200, gravity: 0.55, scalar: 0.8, startVelocity: 0, origin: { x: Math.random(), y: Math.random() - 0.2 }, zIndex: 9999, colors: [randomColor] });
                            if (Date.now() < end) requestAnimationFrame(frame);
                        };
                        frame();
                    }

                    const timer = setTimeout(() => { setPopup(true); }, 3000);
                    return () => clearTimeout(timer);
                }
            }, [allFilled]);

            const handleRetry = () => {
                if (window.SoundEffects) window.SoundEffects.play('reset');
                setFilled({});
                setUsedCards([]);
                setWrongId(null);
                setJustId(null);
                setActiveId(null);
                setWrongKeyId(null);
                setMascotMessage('빈칸에 들어갈 단어를 눌러줘!');
                setMascotImg('img/cha_02.png');
                setPopup(false);
                setTimeUpOpen(false);
                setShowXMark(null);
                setGridShake(false);
                setTimeLeft(TOTAL_TIME);
                setIdleSeconds(0);
                setShowCardHint(false);

                setCountdown(3);
                setIsStarting(true);
                setTimerActive(false);
            };

            const quizOrder = ['창호지', '호랑이', '산골집', '오빠', '부부', '감자', '남매'];
            const activeBlank = (activeId && !filled[activeId])
                ? blanks.find(b => b.id === activeId)
                : blanks.filter(b => !filled[b.id]).sort((x, y) => quizOrder.indexOf(x.word) - quizOrder.indexOf(y.word))[0] || null;

            const clickCard = (card) => {
                if (isStarting) return;
                if (usedCards.includes(card.id)) return;
                if (!activeBlank) return;
                if (timeLeft <= 0) return;

                if (card.syl === activeBlank.expected) {
                    if (window.SoundEffects) window.SoundEffects.play('correct');
                    const msgs = ['와! 맞았어! 👍', '정말 대단해! ✨', '정답이야! 🎈', '멋지다! 😍'];
                    setMascotMessage(msgs[Math.floor(Math.random() * msgs.length)]);
                    setMascotImg('img/cha_02_02.png');
                    setFilled({ ...filled, [activeBlank.id]: card.syl });
                    setUsedCards([...usedCards, card.id]);
                    setJustId(activeBlank.id);
                    setActiveId(null);
                    setIdleSeconds(0);
                    setTimeout(() => {
                        setJustId(null);
                        setMascotImg('img/cha_02.png');
                    }, 700);
                } else {
                    if (window.SoundEffects) window.SoundEffects.play('wrong');
                    const msgs = ['앗! 다시 생각해볼까? 🧐', '음... 이건 아닌 것 같아! 😣', '아쉬워! 다른 글자를 골라봐 ✏️', '에구.. 한 번 더 도전! 💪', '저런! 힌트를 다시 읽어볼까? 📖'];
                    setMascotMessage(msgs[Math.floor(Math.random() * msgs.length)]);
                    setMascotImg('img/cha_02_01.png');
                    setWrongId(activeBlank.id);
                    setWrongKeyId(card.id);

                    const cellIdx = CW.cells.findIndex(c => c?.id === activeBlank.id);
                    xMarkKeyRef.current += 1;
                    setShowXMark({ idx: cellIdx, key: xMarkKeyRef.current });
                    setGridShake(true);
                    setIdleSeconds(0);

                    setTimeout(() => {
                        setWrongId(null);
                        setWrongKeyId(null);
                        setGridShake(false);
                        setMascotImg('img/cha_02.png');
                    }, 500);
                    setTimeout(() => setShowXMark(null), 700);
                }
            };

            const CW_CELL = 64;
            const handleNext = () => {
                if (window.SoundEffects) window.SoundEffects.play('click');
                location.href = 'step2.html';
            };
            const handleContinueAnyway = () => {
                if (window.SoundEffects) window.SoundEffects.play('click');
                setTimeUpOpen(false);
                const foundWords = Object.keys(filled).map(id => CW.wordMap[id]);
                if (foundWords.length === 0) return;
                window.AppState.set('acquired', foundWords);
                setPopup(true);
            };

            return (
                <>
                    {/* --- 피드백 반영: 다채로운 유색 글로우 대신 깔끔하게 떨어지는 소프트 블랙 섀도우 조합 적용 --- */}
                    {isStarting && countdown >= -1 && (
                        <div style={{
                            position: 'fixed', inset: 0, zIndex: 9999, display: 'flex',
                            alignItems: 'center', justifyContent: 'center',
                            background: 'transparent', pointerEvents: 'none'
                        }}>
                            {/* 유리창 영역 */}
                            <div
                                className={countdown === -1 ? 'a-glass-fadeout' : ''}
                                style={{
                                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                                    width: 320, height: 320,
                                    borderRadius: '60px',
                                    background: 'rgba(255, 255, 255, 0.2)',
                                    backdropFilter: 'blur(10px)',
                                    border: '1px solid rgba(255, 255, 255, 0.55)',

                                    // 흐릿하고 뿌연 오라 효과 대신 외곽선을 깔끔하게 떨어뜨려 입체감을 극대화한 정석 그림자 설계
                                    boxShadow: `
                                        0 4px 24px rgba(15, 23, 42, 0.05),     /* 얇고 정교한 밀착 음영 */
                                        0 25px 60px rgba(15, 23, 42, 0.12),    /* 공중에 바짝 띄워주는 깊은 외부 그림자 */
                                        inset 0 1px 1px rgba(255, 255, 255, 0.85) /* 상단 유리 절단면 하이라이트 */
                                    `,
                                    overflow: 'hidden'
                                }}
                            >
                                {/* 내부 텍스트 전환 영역 */}
                                {countdown <= 0 ? (
                                    <div key="start" style={{
                                        fontSize: 110,
                                        fontWeight: 600,
                                        color: '#2ab1a3',
                                        animation: 'startPop 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                                        fontFamily: 'var(--font-h)',
                                        letterSpacing: '0.04em',
                                        paddingLeft: '0.04em'
                                    }}>
                                        시작!
                                    </div>
                                ) : (
                                    <div key={countdown} style={{
                                        fontSize: 150,
                                        fontWeight: 600,
                                        color: 'var(--primary)',
                                        animation: 'countPop 1.0s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                                        fontFamily: 'var(--font-h)',
                                        letterSpacing: '-0.03em'
                                    }}>
                                        {countdown}
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    <div className="a-fadeup" style={{ padding: '0px', paddingTop: 20, position: 'relative' }}>
                        {/* Header: Title + Progress */}
                        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 24, flexWrap: 'wrap' }}>
                            <div style={{ width: 320, maxWidth: 320, padding: '0 10px' }}>
                                <div style={{ display: 'flex', alignItems: 'center', gap: 16, marginBottom: 4 }}>
                                    <h2 className="font-h" style={{ fontSize: 24, color: 'var(--navy-dark)', margin: 0 }}>빈칸 맞추기</h2>
                                    <div className="font-h" style={{ fontSize: 15, color: 'var(--gray)', flexGrow: 1, textAlign: 'right' }}>
                                        <span style={{ color: 'var(--primary)' }}>{Object.keys(filled).length}</span> / {blanks.length}
                                    </div>
                                </div>
                                <div style={{ height: 6, background: 'var(--gray-light)', borderRadius: 3, overflow: 'hidden', width: '100%' }}>
                                    <div style={{ height: '100%', background: 'var(--primary)', borderRadius: 3, width: `${(Object.keys(filled).length / blanks.length) * 100}%`, transition: 'width .6s cubic-bezier(0.16,1,0.3,1)' }} />
                                </div>
                            </div>
                        </div>

                        {/* TIMER Box */}
                        <div style={{ position: 'absolute', left: 344, top: 15, display: 'flex', alignItems: 'center', gap: 6, zIndex: 50 }}>
                            <Timer seconds={timeLeft} isWarning={isWarning} />
                        </div>

                        {/* RIGHT: Mascot with Speech Bubble */}
                        <div style={{ position: 'absolute', right: 0, top: 10, display: 'flex', alignItems: 'flex-start', justifyContent: 'flex-end', gap: 0, zIndex: 50 }}>
                            <div className="a-pop" key={mascotMessage} style={{ background: '#FFF', padding: '10px 14px', borderRadius: '18px', boxShadow: '0 6px 16px rgba(0,0,0,0.06)', border: '2px solid var(--primary-soft)', fontSize: 15, fontWeight: 600, color: '#475569', whiteSpace: 'nowrap', position: 'relative', marginTop: 5, display: 'flex', alignItems: 'center', gap: 6 }}>
                                <span>{mascotMessage}</span>
                                <div style={{ position: 'absolute', right: -6, top: '50%', width: 10, height: 10, background: '#FFF', borderRight: '2px solid var(--primary-soft)', borderTop: '2px solid var(--primary-soft)', transform: 'translateY(-50%) rotate(45deg)', zIndex: 1 }}></div>
                            </div>
                            <div style={{ width: 120, height: 140, display: 'flex', alignItems: 'flex-end', justifyContent: 'center', flexShrink: 0, marginRight: 0 }}>
                                <img src={mascotImg} alt="" style={{ maxWidth: '100%', maxHeight: '100%', objectFit: 'contain', filter: 'drop-shadow(0 6px 12px rgba(0,0,0,0.1))' }} />
                            </div>
                        </div>

                        {/* Main Layout */}
                        <div style={{ display: 'flex', gap: 24, alignItems: 'stretch', flexWrap: 'wrap', marginTop: 10, position: 'relative', zIndex: 1 }}>
                            {/* LEFT: Hint List */}
                            <div style={{ width: 320, flexShrink: 0, background: 'var(--card-solid)', borderRadius: 28, padding: '28px 24px', boxShadow: '0 10px 40px rgba(79,70,229,0.06)' }}>
                                <div className="font-h" style={{ fontSize: 18, color: 'var(--navy-dark)', marginBottom: 16, paddingBottom: 12, borderBottom: '1px solid var(--gray-light)' }}>
                                    책 속의 단어를 맞춰봐!
                                </div>
                                <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                                    {CW.hints.map((h, i) => {
                                        const hintWords = ['호랑이', '창호지', '산골집', '부부', '오빠', '감자', '남매'];
                                        const isActive = activeBlank && hintWords[i] === activeBlank.word;
                                        const isSolved = Object.keys(CW.wordMap).some(k => CW.wordMap[k] === hintWords[i] && filled[k]);
                                        return (
                                            <div style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '16px 18px', borderRadius: 14, transition: 'all .25s ease', cursor: isSolved ? 'default' : 'pointer', opacity: isSolved ? 0.35 : 1, background: isActive ? 'var(--primary-soft)' : 'transparent' }}
                                                key={i}
                                                onClick={() => {
                                                    if (isStarting || isSolved) return;
                                                    if (window.SoundEffects) window.SoundEffects.play('click');
                                                    const b = blanks.find(x => x.word === hintWords[i]);
                                                    if (b && !filled[b.id]) { setActiveId(b.id); setIdleSeconds(0); }
                                                }}
                                                onMouseEnter={e => { if (!isSolved && !isActive) e.currentTarget.style.background = '#F8FAFC'; }}
                                                onMouseLeave={e => { if (!isSolved && !isActive) e.currentTarget.style.background = 'transparent'; }}>
                                                <p style={{ fontSize: 18, fontWeight: 600, margin: 0, lineHeight: 1.5, color: isSolved ? '#94A3B8' : (isActive ? 'var(--primary-deep)' : 'var(--navy)') }}>
                                                    {h}
                                                </p>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>

                            {/* RIGHT: Puzzle + Cards */}
                            <div style={{ flex: 1, minWidth: 0, display: 'flex', flexDirection: 'column', gap: 18 }}>
                                {/* Puzzle Board */}
                                <div style={{ background: '#F5F0E6', border: '2px solid #EAE1D3', borderRadius: 32, padding: '32px', display: 'flex', justifyContent: 'center', position: 'relative' }}>
                                    <div className={gridShake ? 'a-grid-shake' : ''} style={{ display: 'grid', gridTemplateColumns: `repeat(${CW.cols},${CW_CELL}px)`, gap: 8, position: 'relative', zIndex: 2 }}>
                                        {CW.cells.map((cell, i) => {
                                            if (!cell) return <div key={i} style={{ width: CW_CELL, height: CW_CELL }} />;
                                            const baseStyle = { width: CW_CELL, height: CW_CELL, display: 'flex', alignItems: 'center', justifyContent: 'center', borderRadius: 14, fontFamily: 'var(--font-h)', fontWeight: 700, fontSize: 34, transition: 'all .2s cubic-bezier(0.16,1,0.3,1)' };

                                            if (cell.kind === 'fixed') return (
                                                <div key={i} style={{ ...baseStyle, background: '#FFF', color: '#333', border: '1px solid #DDD', position: 'relative' }}>
                                                    <div style={{ position: 'absolute', inset: 4, border: '2px dashed #E5E5E5', borderRadius: 8, pointerEvents: 'none' }} />
                                                    <span style={{ position: 'relative' }}>{cell.syl}</span>
                                                </div>
                                            );

                                            const val = filled[cell.id];
                                            const wrong = wrongId === cell.id;
                                            const just = justId === cell.id;
                                            const active = activeBlank?.id === cell.id;
                                            const showX = showXMark && showXMark.idx === i;

                                            let cellBg = val ? '#FFF' : '#C4B9A9';
                                            let cellColor = val ? '#333' : 'transparent';
                                            let cellBorder = val ? '3px solid #CCC' : active ? '4px solid #F97316' : '3px solid #B0A595';

                                            return (
                                                <div key={i}
                                                    className={`${just ? 'a-pop' : ''} ${wrong ? 'a-cell-wrong-shake a-red-flash' : ''} ${active && !wrong ? 'a-hint-blink' : ''}`}
                                                    onClick={() => {
                                                        if (isStarting || val) return;
                                                        if (window.SoundEffects) window.SoundEffects.play('click');
                                                        setActiveId(cell.id);
                                                        setIdleSeconds(0);
                                                    }}
                                                    style={{ ...baseStyle, background: cellBg, color: cellColor, border: cellBorder, cursor: val ? 'default' : 'pointer', position: 'relative', transform: active && !wrong ? 'scale(1.15)' : 'scale(1)', zIndex: active ? 10 : 1 }}>
                                                    {val && <div style={{ position: 'absolute', inset: 4, border: '2px dashed #E5E5E5', borderRadius: 8, pointerEvents: 'none' }} />}
                                                    <span style={{ position: 'relative' }}>{val || ''}</span>
                                                    {showX && <span key={showXMark.key} className="x-mark">✕</span>}
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>

                                {/* Syllable Cards */}
                                <div style={{ background: '#F5F0E6', borderRadius: 28, padding: '24px 24px 30px 24px', display: 'flex', gap: 14, flexWrap: 'wrap', justifyContent: 'center', boxShadow: 'inset 0 4px 12px rgba(0,0,0,0.03)' }}>
                                    {CW.cards.map(card => {
                                        const used = usedCards.includes(card.id);
                                        const enabled = !isStarting && !used && !!activeBlank;

                                        return (
                                            <button key={card.id} onClick={() => clickCard(card)} disabled={!enabled || used}
                                                className={wrongKeyId === card.id ? 'a-shake' : (showCardHint && activeBlank && card.syl === activeBlank.expected ? 'a-subtle-blink' : '')}
                                                style={{
                                                    width: 72, height: 72, borderRadius: 16,
                                                    border: wrongKeyId === card.id ? '3px solid #DC2626' : '3px solid #CCC',
                                                    cursor: enabled ? 'pointer' : 'default',
                                                    fontFamily: 'var(--font-h)', fontWeight: 700, fontSize: 34,
                                                    transition: 'all .2s cubic-bezier(0.16,1,0.3,1)',
                                                    background: wrongKeyId === card.id ? '#FEE2E2' : '#FFF',
                                                    color: '#333',
                                                    boxShadow: wrongKeyId === card.id ? '0 6px 0 #DC2626' : (enabled ? '0 6px 0 #CCC' : '0 0 0 #CCC'),
                                                    transform: enabled ? 'translateY(0)' : 'translateY(6px)',
                                                    opacity: used ? 0.3 : (enabled ? 1 : 0.6),
                                                    position: 'relative', display: 'flex', alignItems: 'center', justifyContent: 'center'
                                                }}>
                                                <div style={{ position: 'absolute', inset: 4, border: '2px dashed #E5E5E5', borderRadius: 8, pointerEvents: 'none' }} />
                                                <span style={{ position: 'relative' }}>{card.syl}</span>
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    </div>
                    {popup && <AcquiredPopup words={Object.keys(filled).map(id => CW.wordMap[id])} onNext={handleNext} isAll={Object.keys(filled).length === blanks.length} />}
                    {timeUpOpen && <TimeUpPopup foundCount={Object.keys(filled).length} onRetry={handleRetry} onContinue={handleContinueAnyway} />}
                </>
            );
        }

        // 전체 메인 앱 컴포넌트
        function App() {
            return (
                <div style={{ minHeight: '100vh', background: 'linear-gradient(145deg,#EEF2FF 0%,#F8FAFC 45%,#FFF0F8 100%)' }}>
                    <window.StepHeader stepIdx={0} />
                    <div style={{ maxWidth: 1376, margin: '0 auto', padding: '0 32px' }}>
                        <CrossScreen />
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

</html>
