<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>빈칸 맞추기 · 방아 찧는 호랑이</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="common.css" />
    <style>
        /* 오답 클릭 시 셀 흔들기 (강한 shake) */
        @keyframes cellWrongShake {

            0%,
            100% {
                transform: translateX(0) scale(1.15);
            }

            15% {
                transform: translateX(-8px) scale(1.15);
            }

            30% {
                transform: translateX(8px) scale(1.15);
            }

            45% {
                transform: translateX(-6px) scale(1.15);
            }

            60% {
                transform: translateX(6px) scale(1.15);
            }

            75% {
                transform: translateX(-3px) scale(1.15);
            }

            90% {
                transform: translateX(3px) scale(1.15);
            }
        }

        .a-cell-wrong-shake {
            animation: cellWrongShake 0.5s ease-in-out;
        }

        /* 오답 클릭 시 빨간 플래시 효과 */
        @keyframes redFlash {

            0%,
            100% {
                background: #C4B9A9;
                border-color: #B0A595;
            }

            50% {
                background: #FCA5A5;
                border-color: #DC2626;
                box-shadow: 0 0 0 4px rgba(220, 38, 38, 0.2);
            }
        }

        .a-red-flash {
            animation: redFlash 0.5s ease-in-out;
        }

        /* X 표시 페이드 효과 */
        @keyframes xMarkPop {
            0% {
                transform: translate(-50%, -50%) scale(0) rotate(-180deg);
                opacity: 0;
            }

            40% {
                transform: translate(-50%, -50%) scale(1.4) rotate(0deg);
                opacity: 1;
            }

            70% {
                transform: translate(-50%, -50%) scale(1) rotate(0deg);
                opacity: 1;
            }

            100% {
                transform: translate(-50%, -50%) scale(1.2) rotate(0deg);
                opacity: 0;
            }
        }

        .x-mark {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            color: #DC2626;
            font-weight: 900;
            pointer-events: none;
            animation: xMarkPop 0.7s cubic-bezier(.36, .07, .19, .97) forwards;
            z-index: 20;
            text-shadow: 0 2px 8px rgba(220, 38, 38, 0.4);
        }

        /* 퍼즐 알맹이들(Grid)만 흔들리도록 애니메이션 지정 */
        @keyframes gridPiecesShake {

            0%,
            100% {
                transform: translateX(0);
            }

            20% {
                transform: translateX(-4px);
            }

            40% {
                transform: translateX(4px);
            }

            60% {
                transform: translateX(-2px);
            }

            80% {
                transform: translateX(2px);
            }
        }

        .a-grid-shake {
            animation: gridPiecesShake 0.3s ease-in-out;
        }

        /* 10초 이상 정체 시 하단 키보드 정답 카드가 부드럽게 깜빡거리는 힌트 애니메이션 */
        @keyframes subtleBlink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }
        }

        .a-subtle-blink {
            animation: subtleBlink 1.4s ease-in-out infinite;
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <script src="common.js"></script>
    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        function AcquiredPopup({ words, onNext }) {
            return (
                <div style={{ position: 'fixed', inset: 0, background: 'rgba(15, 23, 42, 0.6)', backdropFilter: 'blur(4px)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 200 }}>
                    <div className="a-slideup" style={{ background: 'var(--card-solid)', borderRadius: 32, padding: '64px 48px', maxWidth: 560, width: '90%', textAlign: 'center', boxShadow: 'var(--shadow-lg)' }}>
                        <div style={{ fontSize: 64, marginBottom: 20 }}>🎉</div>
                        <h2 className="font-h" style={{ fontSize: 36, color: 'var(--navy-dark)', marginBottom: 12 }}>단어를 모두 모았어요!</h2>
                        <p style={{ color: 'var(--gray)', fontSize: 16, marginBottom: 40, fontWeight: 500 }}>이 단어들로 다음 이야기를 만들어봐요</p>
                        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 12, justifyContent: 'center', marginBottom: 56 }}>
                            {words.map((w, i) => (
                                <span key={i} className="font-h a-pop" style={{ padding: '12px 28px', background: 'var(--primary-soft)', color: 'var(--primary)', borderRadius: 30, fontSize: 22, animationDelay: `${i * 80}ms` }}>{w}</span>
                            ))}
                        </div>
                        <button className="btn-primary" style={{ width: '100%', fontSize: 20, padding: '20px' }} onClick={onNext}>문장 플레이 시작 →</button>
                    </div>
                </div>
            );
        }

        function TimeoutPopup({ onRetry }) {
            return (
                <div style={{ position: 'fixed', inset: 0, background: 'rgba(15, 23, 42, 0.6)', backdropFilter: 'blur(4px)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 200 }}>
                    <div className="a-slideup" style={{ background: 'var(--card-solid)', borderRadius: 32, padding: '48px 40px', maxWidth: 480, width: '90%', textAlign: 'center', boxShadow: 'var(--shadow-lg)' }}>
                        <div style={{ width: 120, height: 120, margin: '0 auto 24px', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                            <img src="img/cha_02_01.png" alt="아쉬워하는 호랑이" style={{ maxWidth: '100%', maxHeight: '100%', objectFit: 'contain' }} />
                        </div>
                        <h2 className="font-h" style={{ fontSize: 32, color: 'var(--navy-dark)', marginBottom: 14 }}>시간이 다 되었어요!</h2>
                        <p style={{ color: 'var(--gray)', fontSize: 17, marginBottom: 40, fontWeight: 500, lineHeight: 1.6 }}>
                            아쉬워요! 조금만 더 생각하면<br />모든 빈칸을 맞출 수 있었을 텐데요.<br />우리 다시 한번 도전해 볼까요?
                        </p>
                        <button className="btn-primary" style={{ width: '100%', fontSize: 20, padding: '20px' }} onClick={onRetry}>다시 도전하기 🔄</button>
                    </div>
                </div>
            );
        }

        function CrossScreen() {
            const [filled, setFilled] = useState({});
            const [usedCards, setUsedCards] = useState([]);
            const [wrongId, setWrongId] = useState(null);
            const [justId, setJustId] = useState(null);
            const [activeId, setActiveId] = useState(null);
            const [wrongKeyId, setWrongKeyId] = useState(null);
            const [mascotMessage, setMascotMessage] = useState('빈칸에 들어갈 단어를 눌러줘!');
            const [mascotImg, setMascotImg] = useState('img/cha_02.png');
            const [popup, setPopup] = useState(false);
            const [timeoutPopup, setTimeoutPopup] = useState(false);
            const [showXMark, setShowXMark] = useState(null);
            const [gridShake, setGridShake] = useState(false);
            const [timeLeft, setTimeLeft] = useState(60);
            const [idleSeconds, setIdleSeconds] = useState(0);
            const [showCardHint, setShowCardHint] = useState(false);
            const xMarkKeyRef = useRef(0);

            const CW = window.CW;
            const blanks = CW.cells.filter(c => c?.kind === 'blank');
            const allFilled = Object.keys(filled).length === blanks.length;

            useEffect(() => {
                if (allFilled || timeoutPopup) return;

                const timerId = setInterval(() => {
                    setTimeLeft(prev => {
                        if (prev <= 1) {
                            clearInterval(timerId);
                            setTimeoutPopup(true);
                            return 0;
                        }
                        return prev - 1;
                    });
                    setIdleSeconds(prev => prev + 1);
                }, 1000);

                return () => clearInterval(timerId);
            }, [allFilled, timeoutPopup]);

            useEffect(() => {
                if (idleSeconds >= 10) {
                    setShowCardHint(true);
                } else {
                    setShowCardHint(false);
                }
            }, [idleSeconds]);

            useEffect(() => {
                if (allFilled) {
                    window.AppState.set('acquired', Object.values(CW.wordMap));

                    if (typeof confetti === 'function') {
                        // 어두운 팝업창 오버레이 뒤에서도 묻히지 않고 골고루 선명하게 보이도록
                        // 채도와 명도가 매우 높고 비율이 고르게 설계된 네온 페스티벌 컬러셋입니다.
                        const festiveColors = [
                            '#FF2E93', // 선명한 핫핑크
                            '#FF70A6', // 밝은 네온 핑크
                            '#A255FF', // 쨍한 바이올렛 보라
                            '#00F5FF', // 형광 스카이 시안
                            '#38EF7D', // 쨍한 네온 연두
                            '#A6FF96', // 밝은 형광 연두
                            '#FFE600', // 쨍한 형광 옐로우
                            '#FFFB73', // 밝은 레몬 옐로우
                            '#FF9F29', // 포인트 오렌지
                            '#4D96FF'  // 비비드 블루
                        ];

                        // 1. 중앙에서 팡 터지는 첫 번째 폭죽
                        confetti({
                            particleCount: 60,
                            spread: 100,
                            origin: { x: 0.5, y: 0.4 },
                            zIndex: 9999,
                            colors: festiveColors
                        });

                        // 2. 좌측 하단에서 우상향으로 뿜어 올려 화면 전체를 덮는 효과
                        confetti({
                            particleCount: 40,
                            angle: 60,
                            spread: 70,
                            origin: { x: 0.05, y: 0.8 },
                            zIndex: 9999,
                            colors: festiveColors
                        });

                        // 3. 우측 하단에서 좌상향으로 뿜어 올려 화면 전체를 덮는 효과
                        confetti({
                            particleCount: 40,
                            angle: 120,
                            spread: 70,
                            origin: { x: 0.95, y: 0.8 },
                            zIndex: 9999,
                            colors: festiveColors
                        });

                        const duration = 3000;
                        const end = Date.now() + duration;

                        // 4. 화면 전체 영역(상단, 중간, 하단 무작위)에서 끊임없이 생성되어 하강하는 흩날림 효과
                        const frame = () => {
                            // 매 프레임마다 10가지 컬러셋 중 무작위로 1가지를 수동으로 직접 매핑하여 컬러 편향을 차단합니다.
                            const randomColor = festiveColors[Math.floor(Math.random() * festiveColors.length)];
                            confetti({
                                particleCount: 2,
                                angle: 270,
                                spread: 360,
                                ticks: 200,        // 파티클 수명을 200으로 최적화하여 화면 아래로 깔끔하게 떨어져 페이드아웃되도록 합니다.
                                gravity: 0.55,     // 부드러운 낙하를 위해 중력 조정
                                scalar: 0.8,
                                startVelocity: 0,
                                // y 좌표를 화면 전반(위에서 아래까지)에 무작위로 주어 화면 가득 입자가 생성되도록 합니다.
                                origin: { x: Math.random(), y: Math.random() - 0.2 },
                                zIndex: 9999,
                                colors: [randomColor] // 직접 무작위 선택한 색상을 배열 형태로 전달
                            });

                            if (Date.now() < end) {
                                requestAnimationFrame(frame);
                            }
                        };
                        frame();
                    }

                    const timer = setTimeout(() => {
                        setPopup(true);
                    }, 3000);
                    return () => clearTimeout(timer);
                }
            }, [allFilled]);

            const formatTime = (seconds) => {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            };

            const handleRetry = () => {
                setFilled({});
                setUsedCards([]);
                setWrongId(null);
                setJustId(null);
                setActiveId(null);
                setWrongKeyId(null);
                setMascotMessage('빈칸에 들어갈 단어를 눌러줘!');
                setMascotImg('img/cha_02.png');
                setPopup(false);
                setTimeoutPopup(false);
                setShowXMark(null);
                setGridShake(false);
                setTimeLeft(90);
                setIdleSeconds(0);
                setShowCardHint(false);
            };

            // 사용자가 순서대로 학습할 수 있도록 다음 포커스 순서(창호지 -> 호랑이 -> 산골집 -> 오빠 -> 부부 -> 감자 -> 남매)를 정의합니다.
            const quizOrder = ['창호지', '호랑이', '산골집', '오빠', '부부', '감자', '남매'];
            const activeBlank = (activeId && !filled[activeId])
                ? blanks.find(b => b.id === activeId)
                : blanks
                    .filter(b => !filled[b.id])
                    .sort((x, y) => quizOrder.indexOf(x.word) - quizOrder.indexOf(y.word))[0] || null;

            const clickCard = (card) => {
                if (usedCards.includes(card.id)) return;
                if (!activeBlank) return;
                if (timeLeft <= 0) return;

                if (card.syl === activeBlank.expected) {
                    const msgs = ['와! 맞았어! 👍', '정말 대단해! ✨', '정답이야! 🎈', '멋지다! 😍'];
                    setMascotMessage(msgs[Math.floor(Math.random() * msgs.length)]);
                    setMascotImg('img/cha_02_02.png');
                    setFilled({ ...filled, [activeBlank.id]: card.syl });
                    setUsedCards([...usedCards, card.id]);
                    setJustId(activeBlank.id);
                    setActiveId(null);
                    setIdleSeconds(0);
                    setTimeout(() => {
                        setJustId(null);
                        setMascotImg('img/cha_02.png');
                    }, 700);
                } else {
                    const msgs = [
                        '앗! 다시 생각해볼까? 🧐',
                        '음... 이건 아닌 것 같아! 😣',
                        '아쉬워! 다른 글자를 골라봐 ✏️',
                        '에구.. 한 번 더 도전! 💪',
                        '저런! 힌트를 다시 읽어볼까? 힌트를 다시 읽어볼까? 📖'
                    ];
                    setMascotMessage(msgs[Math.floor(Math.random() * msgs.length)]);
                    setMascotImg('img/cha_02_01.png');
                    setWrongId(activeBlank.id);
                    setWrongKeyId(card.id);

                    const cellIdx = CW.cells.findIndex(c => c?.id === activeBlank.id);
                    xMarkKeyRef.current += 1;
                    setShowXMark({ idx: cellIdx, key: xMarkKeyRef.current });

                    setGridShake(true);
                    setIdleSeconds(0);

                    setTimeout(() => {
                        setWrongId(null);
                        setWrongKeyId(null);
                        setGridShake(false);
                        setMascotImg('img/cha_02.png');
                    }, 500);
                    setTimeout(() => setShowXMark(null), 700);
                }
            };

            const CW_CELL = 64;
            const handleNext = () => {
                location.href = 'step2.html';
            };

            return (
                <>
                    <div className="a-fadeup" style={{ padding: '0px', paddingTop: 20, position: 'relative' }}>

                        {/* Header: Title + Progress */}
                        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 24, flexWrap: 'wrap' }}>
                            {/* 요청하신 타이틀 영역 안쪽에 좌우 10px 패딩(padding: '0 10px')을 삽입했습니다. */}
                            <div style={{ width: 320, maxWidth: 320, padding: '0 10px' }}>
                                <div style={{ display: 'flex', alignItems: 'center', gap: 16, marginBottom: 4 }}>
                                    <h2 className="font-h" style={{ fontSize: 24, color: 'var(--navy-dark)', margin: 0 }}>빈칸 맞추기</h2>
                                    <div className="font-h" style={{ fontSize: 15, color: 'var(--gray)', flexGrow: 1, textAlign: 'right' }}>
                                        <span style={{ color: 'var(--primary)' }}>{Object.keys(filled).length}</span> / {blanks.length}
                                    </div>
                                </div>
                                <div style={{ height: 6, background: 'var(--gray-light)', borderRadius: 3, overflow: 'hidden', width: '100%' }}>
                                    <div style={{ height: '100%', background: 'var(--primary)', borderRadius: 3, width: `${(Object.keys(filled).length / blanks.length) * 100}%`, transition: 'width .6s cubic-bezier(0.16,1,0.3,1)' }} />
                                </div>
                            </div>
                        </div>

                        {/* TIMER Box */}
                        <div style={{
                            position: 'absolute', left: 344, top: 15, display: 'flex', alignItems: 'center', gap: 6,
                            background: '#FFF', padding: '10px 16px', borderRadius: '18px', zIndex: 50,
                            fontFamily: 'var(--font-h)', fontSize: 15, fontWeight: 700,
                            color: timeLeft <= 15 ? '#EF4444' : 'var(--navy-dark)',
                            transition: 'color 0.3s ease'
                        }}>
                            <span style={{ fontSize: 16, lineHeight: 1 }}>⏱️</span>
                            <span>{formatTime(timeLeft)}</span>
                        </div>

                        {/* RIGHT: Mascot with Speech Bubble */}
                        <div style={{ position: 'absolute', right: 0, top: 10, display: 'flex', alignItems: 'flex-start', justifyContent: 'flex-end', gap: 0, zIndex: 50 }}>
                            <div className="a-pop" key={mascotMessage} style={{
                                background: '#FFF', padding: '10px 14px', borderRadius: '18px',
                                boxShadow: '0 6px 16px rgba(0,0,0,0.06)', border: '2px solid var(--primary-soft)',
                                fontSize: 15, fontWeight: 600, color: '#475569', whiteSpace: 'nowrap',
                                position: 'relative', marginTop: 5, display: 'flex', alignItems: 'center', gap: 6
                            }}>
                                <span>{mascotMessage}</span>
                                <div style={{
                                    position: 'absolute', right: -6, top: '50%',
                                    width: 10, height: 10, background: '#FFF',
                                    borderRight: '2px solid var(--primary-soft)',
                                    borderTop: '2px solid var(--primary-soft)',
                                    transform: 'translateY(-50%) rotate(45deg)', zIndex: 1
                                }}></div>
                            </div>
                            <div style={{ width: 120, height: 140, display: 'flex', alignItems: 'flex-end', justifyContent: 'center', flexShrink: 0, marginRight: 0 }}>
                                <img src={mascotImg} alt="" style={{ maxWidth: '100%', maxHeight: '100%', objectFit: 'contain', filter: 'drop-shadow(0 6px 12px rgba(0,0,0,0.1))' }} />
                            </div>
                        </div>
                        {/* Main Layout: LEFT (Hints) + RIGHT (Puzzle + Cards) */}
                        <div style={{ display: 'flex', gap: 24, alignItems: 'stretch', flexWrap: 'wrap', marginTop: 10, position: 'relative', zIndex: 1 }}>

                            {/* LEFT: Hint List (White Card) */}
                            <div style={{ width: 320, flexShrink: 0, background: 'var(--card-solid)', borderRadius: 28, padding: '28px 24px', boxShadow: '0 10px 40px rgba(79,70,229,0.06)' }}>
                                <div className="font-h" style={{ fontSize: 18, color: 'var(--navy-dark)', marginBottom: 16, paddingBottom: 12, borderBottom: '1px solid var(--gray-light)' }}>
                                    책 속의 단어를 맞춰봐!
                                </div>
                                <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                                    {CW.hints.map((h, i) => {
                                        const hintWords = ['창호지', '호랑이', '산골집', '오빠', '부부', '감자', '남매'];
                                        const isActive = activeBlank && hintWords[i] === activeBlank.word;
                                        const isSolved = Object.keys(CW.wordMap).some(k => CW.wordMap[k] === hintWords[i] && filled[k]);
                                        return (
                                            <div key={i}
                                                onClick={() => {
                                                    if (isSolved) return;
                                                    const b = blanks.find(x => x.word === hintWords[i]);
                                                    if (b && !filled[b.id]) {
                                                        setActiveId(b.id);
                                                        setIdleSeconds(0);
                                                    }
                                                }}
                                                style={{
                                                    display: 'flex', alignItems: 'center', gap: 8, padding: '16px 18px', borderRadius: 14,
                                                    transition: 'all .25s ease',
                                                    cursor: isSolved ? 'default' : 'pointer',
                                                    opacity: isSolved ? 0.35 : 1,
                                                    background: isActive ? 'var(--primary-soft)' : 'transparent',
                                                }}
                                                onMouseEnter={e => { if (!isSolved && !isActive) e.currentTarget.style.background = '#F8FAFC'; }}
                                                onMouseLeave={e => { if (!isSolved && !isActive) e.currentTarget.style.background = 'transparent'; }}>
                                                <p style={{
                                                    fontSize: 18, fontWeight: 600, margin: 0, lineHeight: 1.5,
                                                    color: isSolved ? '#94A3B8' : (isActive ? 'var(--primary-deep)' : 'var(--navy)')
                                                }}>
                                                    {h}
                                                </p>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>

                            {/* RIGHT: Puzzle + Cards */}
                            <div style={{ flex: 1, minWidth: 0, display: 'flex', flexDirection: 'column', gap: 18 }}>

                                {/* Puzzle Board */}
                                <div style={{ background: '#F5F0E6', border: '2px solid #EAE1D3', borderRadius: 32, padding: '32px', display: 'flex', justifyContent: 'center', position: 'relative' }}>
                                    <div className={gridShake ? 'a-grid-shake' : ''} style={{ display: 'grid', gridTemplateColumns: `repeat(${CW.cols},${CW_CELL}px)`, gap: 8, position: 'relative', zIndex: 2 }}>
                                        {CW.cells.map((cell, i) => {
                                            if (!cell) return <div key={i} style={{ width: CW_CELL, height: CW_CELL }} />;
                                            const baseStyle = { width: CW_CELL, height: CW_CELL, display: 'flex', alignItems: 'center', justifyContent: 'center', borderRadius: 14, fontFamily: 'var(--font-h)', fontWeight: 700, fontSize: 34, transition: 'all .2s cubic-bezier(0.16,1,0.3,1)' };

                                            if (cell.kind === 'fixed') return (
                                                <div key={i} style={{ ...baseStyle, background: '#FFF', color: '#333', border: '1px solid #DDD', position: 'relative' }}>
                                                    <div style={{ position: 'absolute', inset: 4, border: '2px dashed #E5E5E5', borderRadius: 8, pointerEvents: 'none' }} />
                                                    <span style={{ position: 'relative' }}>{cell.syl}</span>
                                                </div>
                                            );

                                            const val = filled[cell.id];
                                            const wrong = wrongId === cell.id;
                                            const just = justId === cell.id;
                                            const active = activeBlank?.id === cell.id;
                                            const showX = showXMark && showXMark.idx === i;

                                            let cellBg = val ? '#FFF' : '#C4B9A9';
                                            let cellColor = val ? '#333' : 'transparent';
                                            let cellBorder = val ? '3px solid #CCC' : active ? '4px solid #F97316' : '3px solid #B0A595';

                                            return (
                                                <div key={i}
                                                    className={`${just ? 'a-pop' : ''} ${wrong ? 'a-cell-wrong-shake a-red-flash' : ''} ${active && !wrong ? 'a-hint-blink' : ''}`}
                                                    onClick={() => {
                                                        if (!val) {
                                                            setActiveId(cell.id);
                                                            setIdleSeconds(0);
                                                        }
                                                    }}
                                                    style={{ ...baseStyle, background: cellBg, color: cellColor, border: cellBorder, cursor: val ? 'default' : 'pointer', position: 'relative', transform: active && !wrong ? 'scale(1.15)' : 'scale(1)', zIndex: active ? 10 : 1 }}>
                                                    {val && <div style={{ position: 'absolute', inset: 4, border: '2px dashed #E5E5E5', borderRadius: 8, pointerEvents: 'none' }} />}
                                                    <span style={{ position: 'relative' }}>{val || ''}</span>
                                                    {showX && (
                                                        <span key={showXMark.key} className="x-mark">✕</span>
                                                    )}
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>

                                {/* Syllable Cards */}
                                <div style={{ background: '#F5F0E6', borderRadius: 28, padding: '24px', display: 'flex', gap: 14, flexWrap: 'wrap', justifyContent: 'center', boxShadow: 'inset 0 4px 12px rgba(0,0,0,0.03)' }}>
                                    {CW.cards.map(card => {
                                        const used = usedCards.includes(card.id);
                                        const enabled = !used && !!activeBlank;
                                        const isWrongKey = wrongKeyId === card.id;
                                        const isTargetHint = showCardHint && activeBlank && card.syl === activeBlank.expected;

                                        return (
                                            <button key={card.id} onClick={() => clickCard(card)} disabled={used}
                                                className={`${isWrongKey ? 'a-shake' : ''} ${isTargetHint ? 'a-subtle-blink' : ''}`}
                                                style={{
                                                    width: 72, height: 72, borderRadius: 16,
                                                    border: isWrongKey ? '3px solid #DC2626' : '3px solid #CCC',
                                                    cursor: enabled ? 'pointer' : 'default',
                                                    fontFamily: 'var(--font-h)', fontWeight: 700, fontSize: 34,
                                                    transition: 'all .2s cubic-bezier(0.16,1,0.3,1)',
                                                    background: isWrongKey ? '#FEE2E2' : '#FFF',
                                                    color: isWrongKey ? '#DC2626' : '#333',
                                                    boxShadow: isWrongKey ? '0 6px 0 #DC2626' : (enabled ? '0 6px 0 #CCC' : '0 0 0 #CCC'),
                                                    transform: enabled ? 'translateY(0)' : 'translateY(6px)',
                                                    opacity: used ? 0.3 : 1,
                                                    position: 'relative', display: 'flex', alignItems: 'center', justifyContent: 'center'
                                                }}>
                                                <div style={{ position: 'absolute', inset: 4, border: '2px dashed #E5E5E5', borderRadius: 8, pointerEvents: 'none' }} />
                                                <span style={{ position: 'relative' }}>{card.syl}</span>
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    </div >
                    {popup && <AcquiredPopup words={Object.values(CW.wordMap)} onNext={handleNext} />}
                    {timeoutPopup && <TimeoutPopup onRetry={handleRetry} />}
                </>
            );
        }

        function App() {
            return (
                <div style={{ minHeight: '100vh', background: 'linear-gradient(145deg,#EEF2FF 0%,#F8FAFC 45%,#FFF0F8 100%)' }}>
                    <window.StepHeader stepIdx={0} />
                    <div style={{ maxWidth: 1376, margin: '0 auto', padding: '0 32px' }}>
                        <CrossScreen />
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

</html>
