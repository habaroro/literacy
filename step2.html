<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문장 플레이 · 방아 찧는 호랑이</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="common.css" />
</head>

<body>
    <div id="root"></div>
    <script src="common.js"></script>
    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        function SentenceScreen({ acquired, onGenerate }) {
            const [pool, setPool] = useState([...acquired]);
            const [placed, setPlaced] = useState([]);
            const [drag, setDrag] = useState(null);
            const [insertAt, setInsertAt] = useState(null);
            const [loading, setLoading] = useState(false);
            const dropRef = useRef(null);
            const [warning, setWarning] = useState('');

            useEffect(() => {
                if (warning) {
                    const t = setTimeout(() => setWarning(''), 2000);
                    return () => clearTimeout(t);
                }
            }, [warning]);

            const canGo = placed.length === 3;

            const startDrag = (e, word, from, fromIdx) => {
                e.preventDefault();
                setDrag({ word, from, fromIdx, x: e.clientX, y: e.clientY });
            };

            const onMove = useCallback((e) => {
                if (!drag) return;
                const cx = e.touches?.[0]?.clientX ?? e.clientX;
                const cy = e.touches?.[0]?.clientY ?? e.clientY;
                setDrag(d => d ? { ...d, x: cx, y: cy } : null);
                if (dropRef.current) {
                    const rect = dropRef.current.getBoundingClientRect();
                    const inZone = cx >= rect.left && cx <= rect.right && cy >= rect.top && cy <= rect.bottom;
                    if (inZone) {
                        const cards = dropRef.current.querySelectorAll('[data-pi]');
                        let idx = placed.length;
                        for (const card of cards) {
                            const r = card.getBoundingClientRect();
                            if (cx < r.left + r.width / 2) { idx = parseInt(card.dataset.pi); break; }
                        }
                        setInsertAt(idx);
                    } else setInsertAt(null);
                }
            }, [drag, placed]);

            const onEnd = useCallback((e) => {
                if (!drag) return;
                const cx = e.changedTouches?.[0]?.clientX ?? e.clientX;
                const cy = e.changedTouches?.[0]?.clientY ?? e.clientY;
                const rect = dropRef.current?.getBoundingClientRect();
                const inZone = rect && cx >= rect.left && cx <= rect.right && cy >= rect.top && cy <= rect.bottom;
                let newPool = [...pool], newPlaced = [...placed];
                if (inZone) {
                    if (drag.from === 'pool') {
                        if (placed.length >= 3) {
                            setWarning('단어 카드는 최대 3장만 배치할 수 있어요!');
                            setDrag(null); setInsertAt(null); return;
                        }
                        newPool = newPool.filter(w => w !== drag.word);
                    } else {
                        newPlaced.splice(drag.fromIdx, 1);
                    }
                    let idx = insertAt ?? newPlaced.length;
                    if (drag.from === 'placed' && drag.fromIdx < idx) idx = Math.max(0, idx - 1);
                    newPlaced.splice(idx, 0, drag.word);
                    setPool(newPool); setPlaced(newPlaced);
                } else {
                    if (drag.from === 'placed') {
                        newPlaced.splice(drag.fromIdx, 1);
                        newPool.push(drag.word);
                        setPool(newPool); setPlaced(newPlaced);
                    }
                }
                setDrag(null); setInsertAt(null);
            }, [drag, pool, placed, insertAt]);

            const go = () => {
                setLoading(true);
                setTimeout(() => onGenerate(placed.slice(0, 3)), 1200);
            };

            const removePlaced = (i) => {
                if (drag) return;
                const word = placed[i];
                setPlaced(p => p.filter((_, idx) => idx !== i));
                setPool(p => [...p, word]);
            };

            return (
                <div style={{ maxWidth: 1280, margin: '0 auto', padding: '40px 24px', minHeight: 'calc(100vh - 70px)', touchAction: 'none' }}
                    onPointerMove={onMove} onPointerUp={onEnd}
                    onTouchMove={e => { e.preventDefault(); onMove(e); }} onTouchEnd={onEnd}>

                    <h2 className="font-h" style={{ fontSize: 25, color: 'var(--navy-dark)', textAlign: 'center', marginBottom: 8 }}>문장 플레이</h2>
                    <p style={{ textAlign: 'center', color: 'var(--gray)', fontSize: 15, marginBottom: 32, fontWeight: 500 }}>단어 카드를 배치해서 이야기를 생성해 봐!</p>

                    <div style={{ display: 'flex', gap: 32, alignItems: 'flex-start' }}>
                        <div style={{ flex: '0 0 52%', minWidth: 0 }}>
                            <div style={{ background: 'var(--card)', height: 550, backdropFilter: 'blur(24px)', WebkitBackdropFilter: 'blur(24px)', border: '1px solid rgba(255,255,255,0.8)', borderRadius: 28, padding: '28px 32px', marginBottom: 24, textAlign: 'center', boxShadow: 'var(--shadow-md)', position: 'relative', overflow: 'hidden', display: 'flex', flexDirection: 'column', justifyContent: 'center', alignItems: 'center' }}>
                                <div style={{ position: 'absolute', top: -20, left: -20, fontSize: 100, opacity: 0.05, transform: 'rotate(-10deg)', pointerEvents: 'none' }}>📖</div>
                                <div style={{ display: 'inline-block', background: 'linear-gradient(135deg, #FEF3C7, #FDE68A)', padding: '5px 14px', borderRadius: 18, boxShadow: '0 4px 12px rgba(253,230,138,0.4)', marginBottom: 16 }}>
                                    <span style={{ fontSize: 13, fontWeight: 800, color: '#92400E', letterSpacing: 2 }}>📖 책 속 한 장면</span>
                                </div>
                                <p style={{ fontSize: 21, color: 'var(--navy-dark)', lineHeight: 1.9, margin: '0 0 24px', fontWeight: 700, wordBreak: 'keep-all' }}>
                                    <span style={{ color: 'var(--primary)', fontSize: 24 }}>"</span>{window.BOOK_EXCERPT}<span style={{ color: 'var(--primary)', fontSize: 24 }}>"</span>
                                </p>
                                <div style={{ width: '100%', borderTop: '2px dashed var(--border-light)', paddingTop: 24, marginBottom: 24 }}>
                                    <span className="a-spinfade" style={{ display: 'inline-block', fontSize: 16, color: 'var(--primary)', fontWeight: 800 }}>🤔 다음엔 어떤 일이 일어났을까요?</span>
                                </div>
                                <img src="img/tig.png" alt="호랑이" style={{ width: 300, height: 'auto', filter: 'drop-shadow(0 15px 30px rgba(0,0,0,0.1))', animation: 'bounce 3s ease-in-out infinite' }} />
                            </div>
                        </div>
                        <div style={{ flex: 1, minWidth: 0 }}>
                            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>
                                <span className="font-h" style={{ fontSize: 15, color: 'var(--navy-dark)' }}>배치 영역</span>
                                <span style={{ fontSize: 12, color: 'var(--gray)', fontWeight: 500 }}>클릭하면 풀로 돌아가요</span>
                            </div>
                            <div ref={dropRef}
                                style={{ minHeight: 220, border: `3px dashed ${drag && insertAt !== null ? 'var(--primary)' : 'var(--blue-mid)'}`, borderRadius: 26, padding: '20px', background: drag && insertAt !== null ? 'var(--primary-soft)' : 'rgba(238, 242, 255, 0.5)', backdropFilter: 'blur(12px)', WebkitBackdropFilter: 'blur(12px)', boxShadow: 'inset 0 4px 20px rgba(0,0,0,0.03)', transition: 'all .3s cubic-bezier(0.16,1,0.3,1)', display: 'flex', flexWrap: 'wrap', alignItems: 'flex-start', alignContent: 'flex-start', gap: 10, position: 'relative', marginBottom: 24 }}>
                                {warning && (
                                    <div className="a-pop" style={{ position: 'absolute', top: 20, left: '50%', transform: 'translateX(-50%)', background: '#EF4444', color: '#fff', padding: '10px 20px', borderRadius: 20, fontSize: 14, fontWeight: 700, boxShadow: '0 8px 24px rgba(239,68,68,0.2)', zIndex: 100, pointerEvents: 'none' }}>
                                        ⚠️ {warning}
                                    </div>
                                )}
                                {placed.length === 0 && !drag && (
                                    <div style={{ width: '100%', textAlign: 'center', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 10, opacity: 0.7, paddingTop: 40 }}>
                                        <span className="a-bounce" style={{ fontSize: 28 }}>👇</span>
                                        <span style={{ color: 'var(--primary)', fontSize: 15, fontWeight: 700 }}>아래 단어 카드 3장을 배치해주세요!</span>
                                    </div>
                                )}
                                {placed.map((word, i) => (
                                    <React.Fragment key={word + i}>
                                        {drag && insertAt === i && <div style={{ width: 4, height: 56, background: 'var(--blue)', borderRadius: 2, flexShrink: 0 }} />}
                                        <div data-pi={i} onPointerDown={e => startDrag(e, word, 'placed', i)} onClick={() => removePlaced(i)}
                                            style={{ padding: '12px 20px', background: drag?.word === word && drag?.from === 'placed' ? 'var(--primary-soft)' : 'linear-gradient(135deg, var(--primary), var(--primary-deep))', color: drag?.word === word && drag?.from === 'placed' ? 'var(--primary)' : '#fff', borderRadius: 14, fontFamily: 'var(--font-h)', fontWeight: 700, fontSize: 18, cursor: 'grab', boxShadow: drag?.word === word && drag?.from === 'placed' ? 'none' : '0 6px 20px rgba(99,102,241,.25)', opacity: drag?.word === word && drag?.from === 'placed' ? 0.6 : 1, userSelect: 'none', flexShrink: 0, transition: 'all .2s cubic-bezier(0.16,1,0.3,1)' }}>
                                            {word}
                                        </div>
                                    </React.Fragment>
                                ))}
                                {drag && insertAt === placed.length && <div style={{ width: 4, height: 56, background: 'var(--blue)', borderRadius: 2, flexShrink: 0 }} />}
                            </div>
                            <div className="font-h" style={{ fontSize: 15, color: 'var(--navy-dark)', marginBottom: 12 }}>단어 카드 풀</div>
                            <div style={{ background: 'var(--card)', backdropFilter: 'blur(24px)', WebkitBackdropFilter: 'blur(24px)', border: '1px solid var(--stroke)', borderRadius: 22, padding: '20px', boxShadow: 'var(--shadow-sm)', display: 'flex', flexWrap: 'wrap', gap: 10, minHeight: 88, alignItems: 'center', marginBottom: 24 }}>
                                {pool.length === 0 && <span style={{ color: '#94A3B8', fontSize: 14, width: '100%', textAlign: 'center', fontWeight: 500 }}>모든 카드가 배치됐어요!</span>}
                                {pool.map((word, i) => (
                                    <div key={word + i} onPointerDown={e => startDrag(e, word, 'pool', i)}
                                        style={{ padding: '12px 20px', background: 'var(--blue-light)', color: 'var(--blue)', borderRadius: 14, fontFamily: 'var(--font-h)', fontWeight: 700, fontSize: 18, cursor: 'grab', border: '2px solid transparent', opacity: drag?.word === word && drag?.from === 'pool' ? 0.5 : 1, transition: 'all .2s cubic-bezier(0.16,1,0.3,1)', userSelect: 'none', flexShrink: 0 }}>
                                        {word}
                                    </div>
                                ))}
                            </div>
                            <button className="btn-primary" disabled={!canGo || loading} style={{ width: '100%', fontSize: 20, padding: '22px' }} onClick={go}>
                                {loading ? '✨ 이야기를 만드는 중...' : canGo ? `✨ AI 이야기 만들기` : '단어 카드를 배치해 주세요'}
                            </button>
                        </div>
                    </div>

                    {drag && (
                        <div style={{ position: 'fixed', left: drag.x - 50, top: drag.y - 30, pointerEvents: 'none', zIndex: 999, padding: '12px 20px', background: 'linear-gradient(135deg, var(--primary), var(--primary-deep))', color: '#fff', borderRadius: 14, fontFamily: 'var(--font-h)', fontWeight: 700, fontSize: 18, boxShadow: '0 12px 32px rgba(99,102,241,.4)', opacity: .95, transform: 'rotate(4deg)' }}>
                            {drag.word}
                        </div>
                    )}
                </div>
            );
        }

        function App() {
            const acquired = window.AppState.get('acquired', ['호랑이', '창호지', '산골집', '부부', '오빠', '감자', '남매']);

            const handleGenerate = (chosen) => {
                window.AppState.set('chosen', chosen);
                window.AppState.set('tone', 'base');
                location.href = 'step3.html';
            };

            return (
                <div style={{ minHeight: '100vh', background: 'linear-gradient(145deg,#EEF2FF 0%,#F8FAFC 45%,#FFF0F8 100%)' }}>
                    <window.StepHeader stepIdx={1} />
                    <div style={{ maxWidth: 1376, margin: '0 auto', padding: '0 32px' }}>
                        <SentenceScreen acquired={acquired} onGenerate={handleGenerate} />
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

</html>
