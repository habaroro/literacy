<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>퍼펙트 문해 · 방아 찧는 호랑이</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="stylesheet" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <style>
    :root {
      --bg-1: #eef2ff;
      --bg-2: #fdf2f8;
      --bg-3: #ecfeff;
      --card: rgba(255, 255, 255, .72);
      --card-solid: #ffffff;
      --stroke: rgba(255, 255, 255, .6);
      --primary: #6366f1;
      --primary-deep: #4f46e5;
      --primary-soft: rgba(99, 102, 241, .12);
      --accent: #f472b6;
      --text: #0f172a;
      --text-sub: #64748b;
      --text-mute: #94a3b8;
      --border-light: #e2e8f0;
      --shadow-sm: 0 1px 2px rgba(15, 23, 42, .04), 0 4px 12px rgba(15, 23, 42, .04);
      --shadow-md: 0 4px 12px rgba(15, 23, 42, .06), 0 12px 32px rgba(15, 23, 42, .08);
      --shadow-lg: 0 20px 60px rgba(79, 70, 229, .18);
      --radius: 16px;
      --radius-lg: 24px;
      --blue: #4F46E5;
      --blue-light: #EEF2FF;
      --blue-mid: #A5B4FC;
      --navy: #1E293B;
      --navy-dark: #0F172A;
      --green: #10B981;
      --green-line: #34D399;
      --bg: #F8FAFC;
      --white: #FFF;
      --gray: #64748B;
      --gray-light: #E2E8F0;
      --font-h: 'Pretendard', sans-serif;
      --font-b: 'Pretendard', sans-serif;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
      -webkit-user-select: none;
      user-select: none;
    }

    body {
      font-family: var(--font-b);
      color: var(--text);
      background:
        radial-gradient(ellipse 80% 60% at 10% 0%, var(--bg-2) 0%, transparent 50%),
        radial-gradient(ellipse 80% 60% at 90% 100%, var(--bg-3) 0%, transparent 50%),
        var(--bg-1);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      letter-spacing: -0.01em;
    }

    body::before,
    body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: .5;
      z-index: 0;
      pointer-events: none;
    }

    body::before {
      width: 380px;
      height: 380px;
      background: #c7d2fe;
      top: -100px;
      left: -100px;
    }

    body::after {
      width: 340px;
      height: 340px;
      background: #fbcfe8;
      bottom: -80px;
      right: -80px;
    }

    #root {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .jua {
      font-family: var(--font-h);
      font-weight: 700;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes pop {
      0% {
        transform: scale(.8);
        opacity: 0
      }

      65% {
        transform: scale(1.05)
      }

      100% {
        transform: scale(1);
        opacity: 1
      }
    }

    @keyframes wrongOrangeFlash {
      0%, 100% { background: #C4B9A9; }
      50% { background: #FDBA74; } /* 조금 더 선명한 주황 톤 */
    }

    .a-wrong-flash {
      animation: wrongOrangeFlash 0.2s 2 ease-in-out;
    }

    @keyframes softPulse {
      0%, 100% {
        transform: scale(1);
        border-color: #F97316;
      }
      50% {
        transform: scale(1.08);
        border-color: #FB923C;
      }
    }

    .a-hint-blink {
      animation: softPulse 2s infinite ease-in-out;
      border: 3px solid #F97316 !important;
      z-index: 10;
    }

    @keyframes shake {

      0%,
      100% {
        transform: translateX(0)
      }

      25% {
        transform: translateX(-5px)
      }

      75% {
        transform: translateX(5px)
      }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(40px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes peekIn {
      0% {
        transform: translate(0, 60px) rotate(-15deg);
        opacity: 0
      }

      60% {
        transform: translate(0, -8px) rotate(5deg);
        opacity: 1
      }

      100% {
        transform: translate(0, 0) rotate(0);
        opacity: 1
      }
    }

    @keyframes bounce {

      0%,
      100% {
        transform: translateY(0)
      }

      50% {
        transform: translateY(-6px)
      }
    }

    @keyframes slideFromCenter {
      0% {
        transform: translateX(calc(50vw - 50% - 12px));
      }

      100% {
        transform: translateX(0);
      }
    }

    @keyframes writingPulse {

      0%,
      100% {
        opacity: 0.25;
      }

      50% {
        opacity: 0.6;
      }
    }

    @keyframes fadeInComments {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes commentsFadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes storyContentReveal {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes spinFade {
      0% {
        opacity: 0;
        transform: translateY(10px)
      }

      100% {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .a-fadeup {
      animation: fadeUp .6s cubic-bezier(0.16, 1, 0.3, 1) both
    }

    .a-pop {
      animation: pop .5s cubic-bezier(.34, 1.56, .64, 1) both
    }

    .a-shake {
      animation: shake .4s ease
    }

    .a-slideup {
      animation: slideUp .5s cubic-bezier(0.16, 1, 0.3, 1) both
    }

    .a-peek {
      animation: peekIn .7s cubic-bezier(.34, 1.56, .64, 1) both
    }

    .a-bounce {
      animation: bounce 2.5s ease-in-out infinite
    }

    .a-spinfade {
      animation: spinFade .5s cubic-bezier(0.16, 1, 0.3, 1) both
    }

    .intro-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 40px 20px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .intro-content {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    @media (min-width: 1024px) {
      .intro-container {
        flex-direction: row;
        text-align: left;
        gap: 80px;
      }

      .intro-content {
        align-items: flex-start;
        text-align: left;
      }
    }

    /* Landscape Tablet Optimization (Short Height) */
    @media (max-height: 800px) and (min-width: 1024px) {
      .intro-container {
        padding: 20px 20px;
        gap: 60px;
      }

      .intro-content p {
        margin-bottom: 24px !important;
      }

      header div {
        height: 60px !important;
      }
    }

    .btn-primary {
      font-family: var(--font-h);
      background: linear-gradient(135deg, var(--primary), var(--primary-deep));
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 16px 32px;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      transition: all .2s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 6px 20px rgba(99, 102, 241, .35);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(99, 102, 241, .45);
    }

    .btn-primary:active {
      transform: scale(.96)
    }

    .btn-primary:disabled {
      background: var(--border-light);
      color: var(--text-mute);
      box-shadow: none;
      cursor: not-allowed;
      transform: none;
    }

    .btn-ghost {
      font-family: var(--font-h);
      background: var(--card);
      backdrop-filter: blur(8px);
      color: var(--navy);
      border: 1px solid var(--stroke);
      border-radius: var(--radius);
      padding: 14px 32px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: var(--shadow-sm);
    }

    .btn-ghost:hover {
      border-color: var(--primary-soft);
      color: var(--primary);
      background: var(--card-solid);
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }

    .dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: var(--blue);
      border-radius: 50%;
      margin: 0 3px;
      animation: bounce 1.4s ease-in-out infinite
    }

    .dot:nth-child(2) {
      animation-delay: .2s
    }

    .dot:nth-child(3) {
      animation-delay: .4s
    }
  </style>
  </style>
</head>

    function generateStory(chosen, tone) {
      const t = tone || 'base';
      const parts = [SENTENCE_POOL.intro[t]];
      (chosen || []).forEach(word => {
        if (SENTENCE_POOL.words[word]) parts.push(SENTENCE_POOL.words[word][t]);
      });
      parts.push(SENTENCE_POOL.outro[t]);
      return parts.join(' ');
    }

    const TONE_OPTIONS = [

    /* ══════════════════════════════════════════════
       WORD GRID — green line + locked direction + character + particles
    ══════════════════════════════════════════════ */
    const CELL = 64, GAP = 5, PAD = 12;
    const cellCenter = (r, c) => ({ x: PAD + c * (CELL + GAP) + CELL / 2, y: PAD + r * (CELL + GAP) + CELL / 2 });
    const GRID_W = PAD * 2 + 7 * (CELL + GAP) - GAP;

    function GridScreen({ foundWords, onFound, onComplete }) {
      const [sel, setSel] = useState([]);
      const [anim, setAnim] = useState(null);
      const [particles, setParticles] = useState([]);
      const [hintCell, setHintCell] = useState(null);
      const gridRef = useRef(null);
      const draggingRef = useRef(false);
      const anchorRef = useRef(null);
      const animActiveRef = useRef(false);
      const selRef = useRef([]);
      const foundWordsRef = useRef(foundWords);
      useEffect(() => { foundWordsRef.current = foundWords; }, [foundWords]);

      const allFound = foundWords.length === GRID_DATA.targets.length;

      const foundMap = {};
      GRID_DATA.targets.forEach(t => {
        if (foundWords.includes(t.word)) t.cells.forEach(([r, c]) => { foundMap[`${r}-${c}`] = t; });
      });

      const inSel = (r, c) => sel.some(([sr, sc]) => sr === r && sc === c);

      const getCellAt = (x, y) => {
        if (!gridRef.current) return null;
        for (const el of gridRef.current.querySelectorAll('[data-rc]')) {
          const rect = el.getBoundingClientRect();
          if (x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom) {
            return el.dataset.rc.split(',').map(Number);
          }
        }
        return null;
      };

      const triggerHit = (newSel, hit) => {
        const startP = cellCenter(newSel[0][0], newSel[0][1]);
        const endP = cellCenter(newSel[newSel.length - 1][0], newSel[newSel.length - 1][1]);
        const key = Date.now();
        setAnim({ start: startP, end: endP, color: hit.color, key });
        animActiveRef.current = true;
        const burst = [];
        for (let i = 0; i < 14; i++) {
          const ang = Math.random() * Math.PI * 2;
          const dist = 30 + Math.random() * 45;
          burst.push({ id: key + '-' + i, x: endP.x, y: endP.y, dx: Math.cos(ang) * dist, dy: Math.sin(ang) * dist, color: hit.color });
        }
        setParticles(p => [...p, ...burst]);
        setTimeout(() => setParticles(p => p.filter(pa => !pa.id.startsWith(key + '-'))), 900);
        onFound(hit.word);
        draggingRef.current = false;
        anchorRef.current = null;
        selRef.current = [];
        setTimeout(() => { setSel([]); setAnim(null); animActiveRef.current = false; }, 900);
      };

      // Free-direction line from anchor to current cell (snapped to 8 dirs)
      const computeFreeLine = (ar, ac, r, c) => {
        if (r === ar && c === ac) return [[ar, ac]];
        const rawDr = r - ar, rawDc = c - ac;
        const adDr = Math.abs(rawDr), adDc = Math.abs(rawDc);
        let dr, dc, n;
        if (adDr === 0) { dr = 0; dc = Math.sign(rawDc); n = adDc; }
        else if (adDc === 0) { dr = Math.sign(rawDr); dc = 0; n = adDr; }
        else if (adDr === adDc) { dr = Math.sign(rawDr); dc = Math.sign(rawDc); n = adDr; }
        else {
          const ratio = adDr / adDc;
          if (ratio < 0.4142) { dr = 0; dc = Math.sign(rawDc); n = adDc; }
          else if (ratio > 2.414) { dr = Math.sign(rawDr); dc = 0; n = adDr; }
          else { dr = Math.sign(rawDr); dc = Math.sign(rawDc); n = Math.max(adDr, adDc); }
        }
        const cells = [];
        for (let i = 0; i <= n && i < 7; i++) {
          const nr = ar + dr * i, nc = ac + dc * i;
          if (nr < 0 || nr >= 7 || nc < 0 || nc >= 7) break;
          cells.push([nr, nc]);
        }
        return cells;
      };

      // Move: update preview only, NO hit check yet
      const handleMove = (cx, cy) => {
        if (!draggingRef.current || !anchorRef.current || animActiveRef.current) return;
        const cell = getCellAt(cx, cy);
        if (!cell) return;
        const [r, c] = cell;
        const [ar, ac] = anchorRef.current;
        const newSel = computeFreeLine(ar, ac, r, c);
        selRef.current = newSel;
        setSel(newSel);
      };

      // Release: confirm match
      const endDrag = () => {
        if (animActiveRef.current) return;
        draggingRef.current = false;
        const cur = selRef.current;
        if (cur.length >= 2) {
          const word = cur.map(([sr, sc]) => GRID_DATA.cells[sr][sc]).join('');
          const hit = GRID_DATA.targets.find(t => t.word === word && !foundWordsRef.current.includes(t.word));
          if (hit) { triggerHit(cur, hit); return; }
        }
        anchorRef.current = null;
        selRef.current = [];
        setSel([]);
      };

      const startDrag = (r, c) => {
        if (animActiveRef.current) return;
        draggingRef.current = true;
        anchorRef.current = [r, c];
        const init = [[r, c]];
        selRef.current = init;
        setSel(init);
      };

      const showHint = (target) => {
        if (foundWords.includes(target.word)) return;
        setHintCell(target.cells[0]);
        setTimeout(() => setHintCell(null), 2000);
      };

      const linePoints = sel.map(([r, c]) => { const p = cellCenter(r, c); return `${p.x},${p.y}`; }).join(' ');

      return (
        <div className="a-fadeup" style={{ display: 'flex', gap: window.innerHeight < 800 ? 24 : 48, alignItems: 'flex-start', justifyContent: 'center', flexWrap: 'wrap', padding: window.innerHeight < 800 ? '20px 0' : '40px 0', minHeight: 'calc(100vh - 70px)' }}>
          <div>
            <ProgressBar label="🔍 글자 연결" current={foundWords.length} total={GRID_DATA.targets.length} />
            <p style={{ fontSize: 14, fontWeight: 500, color: 'var(--gray)', textAlign: 'center', marginBottom: 20 }}>드래그해서 이어진 단어를 찾아봐!</p>

            <div style={{ position: 'relative', display: 'inline-block' }}>
              <div ref={gridRef}
                onMouseMove={e => handleMove(e.clientX, e.clientY)}
                onMouseUp={endDrag} onMouseLeave={endDrag}
                onTouchMove={e => { e.preventDefault(); const t = e.touches[0]; handleMove(t.clientX, t.clientY); }}
                onTouchEnd={endDrag}
                style={{ display: 'grid', gridTemplateColumns: `repeat(7,${CELL}px)`, gap: GAP, background: 'var(--white)', borderRadius: 28, padding: PAD, touchAction: 'none', position: 'relative', zIndex: 1, boxShadow: '0 10px 40px rgba(79,70,229,0.08)' }}>
                {GRID_DATA.cells.map((row, r) => row.map((ch, c) => {
                  const s = inSel(r, c), f = foundMap[`${r}-${c}`];
                  return (
                    <div key={`${r}-${c}`} data-rc={`${r},${c}`}
                      onMouseDown={() => startDrag(r, c)}
                      onTouchStart={e => { e.preventDefault(); startDrag(r, c); }}
                      style={{
                        width: CELL, height: CELL, display: 'flex', alignItems: 'center', justifyContent: 'center', borderRadius: 16, cursor: 'pointer', fontFamily: 'var(--font-h)', fontWeight: 700, fontSize: 22, transition: 'all .2s cubic-bezier(0.16,1,0.3,1)',
                        background: s ? 'rgba(52,211,153,.15)' : f ? f.bg : 'var(--bg)',
                        color: s ? 'var(--navy-dark)' : f ? f.color : 'var(--navy)',
                        border: `2px solid ${s ? 'var(--green-line)' : f ? f.color + '60' : 'transparent'}`,
                        transform: s ? 'scale(.92)' : 'scale(1)',
                        boxShadow: f ? `0 4px 12px ${f.color}25` : 'none',
                        animation: (hintCell && hintCell[0] === r && hintCell[1] === c) ? 'hintBlink .45s ease-in-out 4' : 'none',
                      }}>{ch}</div>
                  );
                }))}
              </div>

              {/* SVG overlay: swipe line + character + particles */}
              <svg width={GRID_W} height={GRID_W} style={{ position: 'absolute', top: 0, left: 0, pointerEvents: 'none', zIndex: 3 }}>
                {sel.length >= 2 && (
                  <polyline points={linePoints} fill="none" stroke="var(--green-line)" strokeWidth="12" strokeLinecap="round" strokeLinejoin="round" opacity="0.6" />
                )}
                {sel.map(([r, c], i) => { const p = cellCenter(r, c); return <circle key={i} cx={p.x} cy={p.y} r="7" fill="var(--green-line)" opacity="0.9" />; })}
                {/* Particles */}
                {particles.map(p => (
                  <circle key={p.id} cx={p.x} cy={p.y} r="6" fill={p.color}
                    style={{
                      animation: `particle-${p.id} .85s cubic-bezier(0.16,1,0.3,1) forwards`,
                      '--dx': p.dx + 'px', '--dy': p.dy + 'px'
                    }} />
                ))}
              </svg>

              {/* Character riding the line on success */}
              {anim && (
                <img src="img/character_02.png" alt="" key={anim.key}
                  style={{
                    position: 'absolute', left: anim.start.x - 30, top: anim.start.y - 30, width: 60, height: 60, pointerEvents: 'none', zIndex: 5,
                    animation: 'rideLine .8s cubic-bezier(.34,1.56,.64,1) forwards',
                    '--tx': (anim.end.x - anim.start.x) + 'px', '--ty': (anim.end.y - anim.start.y) + 'px',
                  }} />
              )}

            {sel.length > 0 && !anim && (
              <p className="jua" style={{ textAlign: 'center', marginTop: 16, fontSize: 16, color: 'var(--green)' }}>
                선택 중: {sel.map(([r, c]) => GRID_DATA.cells[r][c]).join('')}
              </p>
            )}
          </div>

          <div style={{ minWidth: 280, paddingTop: 64 }}>
            <div className="jua" style={{ fontSize: 16, color: 'var(--gray)', marginBottom: 16 }}>찾을 단어</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 10, marginBottom: 40 }}>
              {GRID_DATA.targets.map(t => {
                const found = foundWords.includes(t.word);
                return (
                  <div key={t.word} className={found ? 'a-pop' : ''}
                    style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '12px 20px', borderRadius: 16, background: found ? t.bg : 'rgba(255,255,255,0.7)', backdropFilter: found ? 'none' : 'blur(8px)', border: `2px solid ${found ? t.color + '40' : 'var(--gray-light)'}`, transition: 'all .3s cubic-bezier(0.16,1,0.3,1)', boxShadow: found ? `0 4px 12px ${t.color}15` : 'none' }}>
                    <div>
                      <span style={{ fontSize: 12, color: '#94A3B8', marginRight: 10, fontWeight: 700 }}>{t.label}</span>
                      <span className="jua" style={{ fontSize: 20, color: found ? t.color : '#CBD5E1' }}>{t.word}</span>
                    </div>
                    {found
                      ? <span style={{ color: t.color, fontWeight: 800, fontSize: 18 }}>✓</span>
                      : <button onClick={() => showHint(t)}
                        style={{ fontSize: 12, fontWeight: 600, padding: '6px 12px', borderRadius: 10, border: `1px solid ${t.color}40`, background: 'transparent', color: t.color, cursor: 'pointer', fontFamily: 'var(--font-b)', opacity: .8, transition: 'all .2s' }}
                        onMouseEnter={e => { e.currentTarget.style.opacity = '1'; e.currentTarget.style.background = `${t.color}10`; }}

        }

    /* ══════════════════════════════════════════════
       CROSSWORD — blank-first flow
    ══════════════════════════════════════════════ */
    function CrossScreen({ filled, usedCards, setFilled, setUsedCards, onComplete }) {
      const [wrongId, setWrongId] = useState(null);
      const [justId, setJustId] = useState(null);
      const [activeId, setActiveId] = useState(null);
      const [wrongKeyId, setWrongKeyId] = useState(null);
      const [mascotMessage, setMascotMessage] = useState('빈 칸에 들어갈 단어를 눌러줘!');

      useEffect(() => {
        const timer = setTimeout(() => {
          if (mascotMessage === '빈 칸에 들어갈 단어를 눌러줘!') {
             // Keep it for a while
          }
        }, 5000);
        return () => clearTimeout(timer);
      }, []);

      const blanks = CW.cells.filter(c => c?.kind === 'blank');
      const allFilled = Object.keys(filled).length === blanks.length;

      // Priority: 1. Manual selection 2. First unfilled blank
      const activeBlank = (activeId && !filled[activeId])
        ? blanks.find(b => b.id === activeId)
        : blanks.find(b => !filled[b.id]) || null;

      const clickCard = (card) => {
        if (usedCards.includes(card.id)) return;
        if (!activeBlank) return;
        if (card.syl === activeBlank.expected) {
          const msgs = ['와! 맞았어! 👍', '정말 대단해! ✨', '정답이야! 🎈', '멋지다! 😍'];
          setMascotMessage(msgs[Math.floor(Math.random() * msgs.length)]);
          
          setFilled({ ...filled, [activeBlank.id]: card.syl });
          setUsedCards([...usedCards, card.id]);
          setJustId(activeBlank.id);
          setActiveId(null);
          setTimeout(() => setJustId(null), 700);
        } else {
          const msgs = ['에구.. 다시 해보자! 🧐', '이건 아닌 것 같아.. 😅', '다른 글자를 골라볼까? ✏️'];
          setMascotMessage(msgs[Math.floor(Math.random() * msgs.length)]);
          
          setWrongId(activeBlank.id);
          setWrongKeyId(card.id);
          setTimeout(() => {
            setWrongId(null);
            setWrongKeyId(null);
          }, 400);
        }
      };

      const CW_CELL = 64;

      return (
        <div className="a-fadeup" style={{ display: 'flex', gap: window.innerHeight < 800 ? 24 : 40, alignItems: 'stretch', justifyContent: 'center', flexWrap: 'wrap', padding: window.innerHeight < 800 ? '20px 0' : '40px 0' }}>
          <div style={{ flex: 1, maxWidth: 640 }}>
            <div style={{ marginBottom: 24 }}>
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>
                <h2 className="jua" style={{ fontSize: 28, color: 'var(--navy-dark)', margin: 0 }}>빈칸 맞추기</h2>
                <div className="jua" style={{ fontSize: 20, color: 'var(--gray)' }}>
                  <span style={{ color: 'var(--primary)' }}>{Object.keys(filled).length}</span> / {blanks.length}
                </div>
              </div>
              <div style={{ height: 10, background: 'var(--gray-light)', borderRadius: 5, overflow: 'hidden' }}>
                <div style={{ height: '100%', background: 'var(--primary)', borderRadius: 5, width: `${(Object.keys(filled).length / blanks.length) * 100}%`, transition: 'width .6s cubic-bezier(0.16,1,0.3,1)' }} />
              </div>
            </div>



            <div style={{ background: '#F5F0E6', border: '2px solid #EAE1D3', borderRadius: 36, padding: '20px 32px', display: 'flex', flexDirection: 'column', alignItems: 'center', marginBottom: 20, position: 'relative' }}>



              <div style={{ display: 'grid', gridTemplateColumns: `repeat(${CW.cols},${CW_CELL}px)`, gap: 8, position: 'relative', zIndex: 2 }}>
                {CW.cells.map((cell, i) => {
                  if (!cell) return <div key={i} style={{ width: CW_CELL, height: CW_CELL }} />;

                  const baseStyle = { width: CW_CELL, height: CW_CELL, display: 'flex', alignItems: 'center', justifyContent: 'center', borderRadius: 14, fontFamily: 'var(--font-h)', fontWeight: 700, fontSize: 34, transition: 'all .2s cubic-bezier(0.16,1,0.3,1)' };

                  if (cell.kind === 'fixed') return (
                    <div key={i} style={{ ...baseStyle, background: '#FFF', color: '#333', border: '1px solid #DDD', position: 'relative' }}>
                      <div style={{ position: 'absolute', inset: 4, border: '2px dashed #E5E5E5', borderRadius: 8, pointerEvents: 'none' }} />
                      <span style={{ position: 'relative', top: 0 }}>{cell.syl}</span>
                    </div>
                  );

                  const val = filled[cell.id], wrong = wrongId === cell.id, just = justId === cell.id, active = activeBlank?.id === cell.id;

                  let cellBg = val ? '#FFF' : '#C4B9A9';
                  let cellColor = val ? '#333' : 'transparent';
                  let cellBorder = val ? '3px solid #CCC' : active ? '4px solid #F97316' : '3px solid #B0A595';

                  return (
                    <div key={i} className={`${just ? 'a-pop' : ''} ${wrong ? 'a-wrong-flash' : ''} ${active ? 'a-hint-blink' : ''}`}
                      onClick={() => !val && setActiveId(cell.id)}
                      onMouseEnter={e => { if (!val && !active) e.currentTarget.style.borderColor = '#FB923C'; }}
                      onMouseLeave={e => { if (!val && !active) e.currentTarget.style.borderColor = '#B0A595'; }}
                      style={{ ...baseStyle, background: cellBg, color: cellColor, border: cellBorder, cursor: val ? 'default' : 'pointer', position: 'relative', transform: active ? 'scale(1.15)' : 'scale(1)', zIndex: active ? 10 : 1 }}>
                      {val && <div style={{ position: 'absolute', inset: 4, border: '2px dashed #E5E5E5', borderRadius: 8, pointerEvents: 'none' }} />}
                      <span style={{ position: 'relative', top: 0 }}>{val || ''}</span>
                    </div>
                  );
                })}
              </div>
            </div>

            <div style={{ background: '#F5F0E6', borderRadius: 28, padding: 24, display: 'flex', gap: 14, flexWrap: 'wrap', justifyContent: 'center', boxShadow: 'inset 0 4px 12px rgba(0,0,0,0.03)' }}>
              {CW.cards.map(card => {
                const used = usedCards.includes(card.id);
                const enabled = !used && !!activeBlank;
                return (
                  <button key={card.id} onClick={() => clickCard(card)} disabled={used}
                    className={wrongKeyId === card.id ? 'a-shake' : ''}
                    style={{
                      width: 72, height: 72, borderRadius: 16, border: '3px solid #CCC', cursor: enabled ? 'pointer' : 'default', fontFamily: 'var(--font-h)', fontWeight: 700, fontSize: 34, transition: 'all .2s cubic-bezier(0.16,1,0.3,1)',
                      background: '#FFF', color: wrongKeyId === card.id ? '#FF3B30' : '#333',
                      boxShadow: enabled ? '0 6px 0 #CCC' : '0 0 0 #CCC',
                      transform: enabled ? 'translateY(0)' : 'translateY(6px)',
                      opacity: used ? 0.3 : 1,
                      position: 'relative',
                      display: 'flex', alignItems: 'center', justifyContent: 'center'
                    }}
                    onMouseEnter={e => { if (enabled && !wrongKeyId && card.syl === activeBlank.expected) { e.currentTarget.style.transform = 'translateY(-4px)'; e.currentTarget.style.boxShadow = '0 10px 0 #CCC'; } }}
                    onMouseLeave={e => { if (enabled && !wrongKeyId && card.syl === activeBlank.expected) { e.currentTarget.style.transform = 'translateY(0)'; e.currentTarget.style.boxShadow = '0 6px 0 #CCC'; } }}
                    onPointerDown={e => { if (enabled && !wrongKeyId && card.syl === activeBlank.expected) { e.currentTarget.style.transform = 'translateY(6px)'; e.currentTarget.style.boxShadow = '0 0 0 #CCC'; } }}>
                    <div style={{ position: 'absolute', inset: 4, border: '2px dashed #E5E5E5', borderRadius: 8, pointerEvents: 'none' }} />
                    <span style={{ position: 'relative', top: 0 }}>{card.syl}</span>
                  </button>
                );
              })}
            </div>
          </div>

          <div style={{ width: 320, display: 'flex', flexDirection: 'column' }}>
            <div style={{ position: 'relative', height: 80, marginBottom: 0 }}>
               {/* Mascot with Speech Bubble */}
               <img src="img/cha_02.png" alt="" style={{ position: 'absolute', right: 10, bottom: 0, width: 65, filter: 'drop-shadow(0 6px 12px rgba(0,0,0,0.1))', zIndex: 5 }} />
               <div className="jua a-pop" key={mascotMessage} style={{ 
                 position: 'absolute', right: 85, top: 0, 
                 background: '#FFF', padding: '10px 16px', borderRadius: '18px', 
                 boxShadow: '0 8px 20px rgba(0,0,0,0.06)', border: '2px solid var(--primary-soft)',
                 fontSize: 15, color: 'var(--navy-dark)', whiteSpace: 'nowrap', zIndex: 4
               }}>
                 {mascotMessage}
                 {/* Speech Bubble Tail */}
                 <div style={{ 
                   position: 'absolute', right: -6, bottom: 10, 
                   width: 12, height: 12, background: '#FFF', 
                   borderRight: '2px solid var(--primary-soft)', 
                   borderBottom: '2px solid var(--primary-soft)', 
                   transform: 'rotate(-45deg)', zIndex: 1 
                 }}></div>
               </div>
            </div>
            
            <div style={{ background: 'var(--card-solid)', borderRadius: 32, padding: '24px', display: 'flex', flexDirection: 'column', gap: 12, flex: 1 }}>
              <div className="jua" style={{ fontSize: 20, color: 'var(--navy-dark)', marginBottom: 8 }}>
                힌트
              </div>
              {CW.hints.map((h, i) => {
                const hintWords = ['호랑이', '창호지', '산골집', '부부', '오빠', '감자', '남매'];
                const isActive = activeBlank && hintWords[i] === activeBlank.word;
                const isSolved = Object.keys(CW.wordMap).some(k => CW.wordMap[k] === hintWords[i] && filled[k]);

                return (
                  <div key={i}
                    onClick={() => {
                      if (isSolved) return;
                      const b = blanks.find(x => x.word === hintWords[i]);
                      if (b && !filled[b.id]) setActiveId(b.id);
                    }}
                    style={{
                      display: 'flex', alignItems: 'flex-start', gap: 12, padding: '12px 16px', borderRadius: 20, transition: 'all .3s ease', border: '2px solid transparent',
                      cursor: isSolved ? 'default' : 'pointer',
                      opacity: isSolved ? 0.4 : 1,
                    }}>

                    <p style={{
                      fontSize: 16, fontWeight: 700, margin: 0, lineHeight: 1.6,
                      color: isSolved ? '#94A3B8' : (isActive ? 'var(--primary)' : 'var(--navy-dark)')
                    }}>
                      {h}
                    </p>
                  </div>
                );
              })}
              
              <div style={{ marginTop: 'auto', paddingTop: 20 }}>
                {allFilled && (
                  <button className="btn-primary a-pop" style={{ width: '100%', padding: '20px', fontSize: 22, borderRadius: 24, boxShadow: '0 8px 24px rgba(99,102,241,.4)' }} onClick={onComplete}>
                    다음 단계로 →
                  </button>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    }

    /* ══════════════════════════════════════════════

    }

    /* ══════════════════════════════════════════════
       SENTENCE PLAY — drag & drop
    ══════════════════════════════════════════════ */
    function SentenceScreen({ acquired, onGenerate }) {
      const [pool, setPool] = useState([...acquired]);
      const [placed, setPlaced] = useState([]);
      const [drag, setDrag] = useState(null);
      const [insertAt, setInsertAt] = useState(null);
      const [loading, setLoading] = useState(false);
      const dropRef = useRef(null);

      const canGo = placed.length >= 3;

      const startDrag = (e, word, from, fromIdx) => {
        e.preventDefault();
        setDrag({ word, from, fromIdx, x: e.clientX, y: e.clientY });
      };

      const onMove = useCallback((e) => {
        if (!drag) return;
        const cx = e.touches?.[0]?.clientX ?? e.clientX;
        const cy = e.touches?.[0]?.clientY ?? e.clientY;
        setDrag(d => d ? { ...d, x: cx, y: cy } : null);
        if (dropRef.current) {
          const rect = dropRef.current.getBoundingClientRect();
          const inZone = cx >= rect.left && cx <= rect.right && cy >= rect.top && cy <= rect.bottom;
          if (inZone) {
            const cards = dropRef.current.querySelectorAll('[data-pi]');
            let idx = placed.length;
            for (const card of cards) {
              const r = card.getBoundingClientRect();
              if (cx < r.left + r.width / 2) { idx = parseInt(card.dataset.pi); break; }
            }
            setInsertAt(idx);
          } else setInsertAt(null);
        }
      }, [drag, placed]);

      const onEnd = useCallback((e) => {
        if (!drag) return;
        const cx = e.changedTouches?.[0]?.clientX ?? e.clientX;
        const cy = e.changedTouches?.[0]?.clientY ?? e.clientY;
        const rect = dropRef.current?.getBoundingClientRect();
        const inZone = rect && cx >= rect.left && cx <= rect.right && cy >= rect.top && cy <= rect.bottom;
        let newPool = [...pool], newPlaced = [...placed];
        if (drag.from === 'pool') newPool = newPool.filter(w => w !== drag.word);
        else newPlaced.splice(drag.fromIdx, 1);
        if (inZone) {
          let idx = insertAt ?? newPlaced.length;
          if (drag.from === 'placed' && drag.fromIdx < idx) idx = Math.max(0, idx - 1);
          newPlaced.splice(idx, 0, drag.word);
          setPool(newPool); setPlaced(newPlaced);
        } else {
          if (drag.from === 'placed') { newPool.push(drag.word); setPool(newPool); setPlaced(newPlaced); }
        }
        setDrag(null); setInsertAt(null);
      }, [drag, pool, placed, insertAt]);

      const go = () => { setLoading(true); setTimeout(() => onGenerate(placed.slice(0, 3)), 1200); };

      const removePlaced = (i) => {
        if (drag) return;
        const word = placed[i];
        setPlaced(p => p.filter((_, idx) => idx !== i));
        setPool(p => [...p, word]);
      };

      return (
        <div style={{ maxWidth: 1280, margin: '0 auto', padding: '40px 24px', minHeight: 'calc(100vh - 70px)', touchAction: 'none' }}
          onPointerMove={onMove} onPointerUp={onEnd}
          onTouchMove={e => { e.preventDefault(); onMove(e); }} onTouchEnd={onEnd}>

          <h2 className="jua" style={{ fontSize: 32, color: 'var(--navy-dark)', textAlign: 'center', marginBottom: 8 }}>2단계 · 문장 플레이</h2>
          <p style={{ textAlign: 'center', color: 'var(--gray)', fontSize: 15, marginBottom: 32, fontWeight: 500 }}>단어 카드를 드래그해서 이야기 순서대로 배치해봐!</p>

          <div style={{ display: 'flex', gap: 32, alignItems: 'flex-start' }}>

            {/* LEFT: Book excerpt ONLY */}
            <div style={{ flex: '0 0 52%', minWidth: 0 }}>
              <div style={{ background: 'var(--card)', height: 550, backdropFilter: 'blur(24px)', WebkitBackdropFilter: 'blur(24px)', border: '1px solid rgba(255,255,255,0.8)', borderRadius: 28, padding: '28px 32px', marginBottom: 24, textAlign: 'center', boxShadow: 'var(--shadow-md)', position: 'relative', overflow: 'hidden', display: 'flex', flexDirection: 'column', justifyContent: 'center', alignItems: 'center' }}>
                <div style={{ position: 'absolute', top: -20, left: -20, fontSize: 100, opacity: 0.05, transform: 'rotate(-10deg)', pointerEvents: 'none' }}>📖</div>
                <div style={{ display: 'inline-block', background: 'linear-gradient(135deg, #FEF3C7, #FDE68A)', padding: '5px 14px', borderRadius: 18, boxShadow: '0 4px 12px rgba(253,230,138,0.4)', marginBottom: 16 }}>
                  <span style={{ fontSize: 13, fontWeight: 800, color: '#92400E', letterSpacing: 2 }}>📖 책 속 한 장면</span>
                </div>
                <p style={{ fontSize: 21, color: 'var(--navy-dark)', lineHeight: 1.9, margin: '0 0 24px', fontWeight: 700, wordBreak: 'keep-all' }}>

    /* ══════════════════════════════════════════════

    function FeedbackScreen({ chosen, tone, onRegenerate, onReset }) {
      const [showComments, setShowComments] = useState(false);
      const [showPeek, setShowPeek] = useState(false);
      const [showTonePopup, setShowTonePopup] = useState(false);
      const [regenerating, setRegenerating] = useState(false);
      const [likes, setLikes] = useState({});
      const [storyKey, setStoryKey] = useState(0);
      // phase: 'writing' | 'sliding' | 'done'
      const [phase, setPhase] = useState('writing');

      // Phase state machine on mount and tone change
      useEffect(() => {
        setPhase('writing');
        setShowComments(false);
        setShowPeek(false);
        setStoryKey(k => k + 1);
        // writing → sliding at 2600ms (card slides left, story content appears)
        const tw = setTimeout(() => setPhase('sliding'), 2600);
        // sliding → done at 2600+1000ms (slide animation duration)
        const ts = setTimeout(() => setPhase('done'), 2600 + 1000);
        // comments fade in 600ms after slide completes (smooth opacity)
        const t1 = setTimeout(() => setShowComments(true), 2600 + 1000 + 600);
        const t2 = setTimeout(() => setShowPeek(true), 2600 + 1000 + 600 + CHARACTERS.length * 500 + 800);
        return () => { clearTimeout(tw); clearTimeout(ts); clearTimeout(t1); clearTimeout(t2); };
      }, [tone]);

      const handleToneSelect = (newTone) => {
        setShowTonePopup(false);
        setRegenerating(true);
        setTimeout(() => {
          setRegenerating(false);
          onRegenerate(newTone);
        }, 800);
      };

      const toggleLike = (charId) => setLikes(l => ({ ...l, [charId]: !l[charId] }));
      const story = generateStory(chosen, tone);
      const renderStory = (text) => {
        if (!chosen || chosen.length === 0) return text;
        const sorted = [...chosen].sort((a, b) => b.length - a.length);
        const escaped = sorted.map(w => w.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
        const parts = text.split(new RegExp(`(${escaped.join('|')})`, 'g'));
        return parts.map((p, i) =>
          chosen.includes(p)
            ? <span key={i} style={{ color: 'var(--blue)', fontWeight: 800, background: 'rgba(67,97,238,.1)', borderRadius: 4, padding: '1px 3px' }}>{p}</span>
            : p

                      disabled={opt.id === tone}
                      style={{ display: 'flex', alignItems: 'center', gap: 16, padding: '18px 22px', border: `2px solid ${opt.id === tone ? 'var(--blue)' : 'var(--gray-light)'}`, borderRadius: 20, background: opt.id === tone ? 'var(--blue-light)' : '#fff', cursor: opt.id === tone ? 'default' : 'pointer', transition: 'all .3s cubic-bezier(0.16,1,0.3,1)', textAlign: 'left', width: '100%' }}
                      onMouseEnter={e => { if (opt.id !== tone) { e.currentTarget.style.borderColor = 'var(--blue-mid)'; e.currentTarget.style.transform = 'translateY(-2px)'; e.currentTarget.style.boxShadow = '0 8px 24px rgba(79,70,229,.1)'; } }}
                      onMouseLeave={e => { if (opt.id !== tone) { e.currentTarget.style.borderColor = 'var(--gray-light)'; e.currentTarget.style.transform = ''; e.currentTarget.style.boxShadow = 'none'; } }}>
                      <div style={{ fontSize: 30 }}>{opt.icon}</div>
                      <div style={{ flex: 1 }}>
                        <div className="jua" style={{ fontSize: 17, color: 'var(--navy-dark)' }}>{opt.label}</div>
                        <div style={{ fontSize: 13, color: 'var(--gray)', marginTop: 4, fontWeight: 500 }}>{opt.desc}</div>
                      </div>
                      {opt.id === tone && <span style={{ fontSize: 12, color: 'var(--blue)', fontWeight: 800 }}>지금 분위기</span>}
                    </button>
                  ))}
                </div>
                <button onClick={() => setShowTonePopup(false)} className="btn-ghost" style={{ width: '100%', marginTop: 24, padding: '16px' }}>닫기</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    function CommentRow({ char, text, delay, liked, onLike }) {
      const [show, setShow] = useState(false);
      useEffect(() => { const t = setTimeout(() => setShow(true), delay); return () => clearTimeout(t); }, [delay]);
      if (!show) return <div style={{ height: 0 }} />;
      return (
        <div className="a-spinfade" style={{ padding: '20px 24px', borderBottom: '1px solid var(--gray-light)', display: 'flex', gap: 16 }}>
          <div style={{ width: 48, height: 48, borderRadius: '50%', overflow: 'hidden', background: 'var(--bg)', border: `2px solid ${char.ring}`, flexShrink: 0 }}>
            <img src={char.img} alt="" style={{ width: '100%', height: '100%', objectFit: 'cover' }} />
          </div>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ display: 'flex', alignItems: 'baseline', gap: 8, marginBottom: 6 }}>
              <span className="jua" style={{ fontSize: 16, color: 'var(--navy-dark)' }}>{char.name}</span>
              <span style={{ fontSize: 12, color: '#94A3B8', fontWeight: 600 }}>· {char.role}</span>
            </div>
            <p style={{ fontSize: 15, color: 'var(--navy)', lineHeight: 1.8, margin: 0, wordBreak: 'keep-all', fontWeight: 500 }}>{text}</p>
            <div style={{ marginTop: 12, display: 'flex', gap: 16, alignItems: 'center' }}>
              <button onClick={onLike}
                style={{ background: 'none', border: 'none', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 6, padding: 0, color: liked ? '#E11D48' : '#94A3B8', fontSize: 14, fontWeight: 700, transition: 'all .2s cubic-bezier(0.16,1,0.3,1)', transform: liked ? 'scale(1.05)' : 'scale(1)' }}>
                <span style={{ fontSize: 15 }}>{liked ? '❤️' : '🤍'}</span>
                <span>{liked ? '좋아요 1' : '좋아요'}</span>
              </button>
            </div>
          </div>
        </div>
      );
    }

    /* ── Progress Bar ── */
    function ProgressBar({ label, current, total }) {
      return (
        <div style={{ marginBottom: 24 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
            <span className="jua" style={{ color: 'var(--blue)', fontSize: 18 }}>{label}</span>
            <span style={{ color: '#94A3B8', fontSize: 15, fontWeight: 700 }}>{current} / {total}</span>
          </div>
          <div style={{ height: 10, background: 'var(--gray-light)', borderRadius: 5, overflow: 'hidden' }}>
            <div style={{ height: '100%', background: 'var(--blue)', borderRadius: 5, width: `${(current / total) * 100}%`, transition: 'width .6s cubic-bezier(0.16,1,0.3,1)' }} />
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>

</html>
