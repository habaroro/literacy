<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>퍼펙트 문해 · 방아 찧는 호랑이</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="common.css" />
    <link rel="shortcut icon" href="img/appicon.png" type="image/png" />
    <link rel="apple-touch-icon" href="img/appicon.png" />
    <link rel="manifest" href="manifest.json">
    <script>
        // 서비스 워커 등록을 통한 PWA 활성화
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker registered successfully:', reg.scope))
                    .catch(err => console.error('Service Worker registration failed:', err));
            });
        }
    </script>
</head>

<body>
    <div id="root"></div>
    <script src="common.js"></script>
    <script type="text/babel">
        function IntroScreen() {
            const [isMuted, setIsMuted] = React.useState(() => {
                return localStorage.getItem('app_sound_enabled') === 'false';
            });

            React.useEffect(() => {
                // 인트로 화면이 나타나면 배경음악을 재생합니다.
                if (window.SoundEffects) {
                    window.SoundEffects.playBGM();
                }
                
                const handleStorageChange = (e) => {
                    if (e.key === 'app_sound_enabled') {
                        setIsMuted(e.newValue === 'false');
                    }
                };
                window.addEventListener('storage', handleStorageChange);

                // 페이지를 벗어나거나 컴포넌트가 사라지면 배경음악을 멈춥니다.
                return () => {
                    if (window.SoundEffects) {
                        window.SoundEffects.stopBGM();
                    }
                    window.removeEventListener('storage', handleStorageChange);
                };
            }, []);

            const toggleMute = () => {
                const nextMuted = !isMuted;
                setIsMuted(nextMuted);
                if (window.SoundEffects) {
                    window.SoundEffects.setEnabled(!nextMuted);
                    if (!nextMuted) {
                        window.SoundEffects.play('click');
                    }
                }
            };

            const onStart = () => {
                if (window.SoundEffects) window.SoundEffects.play('click');
                window.AppState.reset();
                location.href = 'step1.html';
            };

            return (
                <div 
                    className="premium-aurora-bg" 
                    style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', position: 'relative' }}
                >
                    {/* 🔊 사운드 ON/OFF 제어 토글 버튼 (화면 우측 상단 고정 배치) */}
                    <button
                        onClick={toggleMute}
                        title={isMuted ? '소리 켜기' : '소리 끄기'}
                        style={{
                            position: 'absolute',
                            top: 24,
                            right: 32,
                            width: 40,
                            height: 40,
                            borderRadius: '50%',
                            border: isMuted ? '1.5px solid #CBD5E1' : '1.5px solid rgba(79, 70, 229, 0.3)',
                            background: isMuted ? '#F8FAFC' : 'rgba(79, 70, 229, 0.06)',
                            cursor: 'pointer',
                            display: 'flex',
                            alignItems: 'center',
                            justifyContent: 'center',
                            transition: 'all 0.2s ease',
                            padding: 0,
                            boxShadow: '0 2px 8px rgba(0, 0, 0, 0.04)',
                            outline: 'none',
                            zIndex: 200
                        }}
                        onMouseEnter={e => {
                            e.currentTarget.style.transform = 'scale(1.08)';
                            if (isMuted) {
                                e.currentTarget.style.background = '#E2E8F0';
                            } else {
                                e.currentTarget.style.background = 'rgba(79, 70, 229, 0.12)';
                                e.currentTarget.style.borderColor = 'rgba(79, 70, 229, 0.6)';
                            }
                        }}
                        onMouseLeave={e => {
                            e.currentTarget.style.transform = 'scale(1)';
                            if (isMuted) {
                                e.currentTarget.style.background = '#F8FAFC';
                            } else {
                                e.currentTarget.style.background = 'rgba(79, 70, 229, 0.06)';
                                e.currentTarget.style.borderColor = 'rgba(79, 70, 229, 0.3)';
                            }
                        }}
                    >
                        {isMuted 
                        ? <svg width={16} height={16} viewBox="0 0 24 24" fill="none" stroke="#64748B" strokeWidth={2.5} strokeLinecap="round" strokeLinejoin="round">
                            <path d="M11 5L6 9H2v6h4l5 4V5z" />
                            <line x1={23} y1={9} x2={17} y2={15} />
                            <line x1={17} y1={9} x2={23} y2={15} />
                          </svg>
                        : <svg width={16} height={16} viewBox="0 0 24 24" fill="none" stroke="#4F46E5" strokeWidth={2.5} strokeLinecap="round" strokeLinejoin="round">
                            <path d="M11 5L6 9H2v6h4l5 4V5z" />
                            <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07" />
                          </svg>
                        }
                    </button>

                    <div className="a-fadeup intro-container-v2">
                        <div className="intro-grid-v2">
                            <div className="intro-visual-v2">
                                <div className="intro-book-wrap-v2" style={{ position: 'relative' }}>
                                    <div className="book-glow-frame">
                                        <div className="spine-shadow" />
                                        <img src="img/cover.png" alt="방아 찧는 호랑이 책 표지" className="intro-book-cover-v2" style={{ width: 340, height: 'auto', display: 'block', borderRadius: 16 }} />
                                    </div>
                                    <div
                                        className="char-with-blink intro-book-char-v2 a-bounce"
                                        style={{
                                            position: 'absolute',
                                            left: -139,
                                            bottom: -36,
                                            width: 206,
                                            filter: 'drop-shadow(0 15px 25px rgba(0,0,0,0.15))',
                                            zIndex: 10
                                        }}
                                    >
                                        <img src="img/character_04.png" alt="" />
                                        <div className="eyelid eyelid-left"></div>
                                        <div className="eyelid eyelid-right"></div>
                                    </div>

                                </div>
                            </div>
                            <div className="intro-content-v2" style={{ paddingLeft: 16 }}>
                                <div className="intro-eyebrow-v2">
                                    <span className="intro-eyebrow-dot-v2" />
                                    <span>WEEKLY BOOK · VOL.12</span>
                                </div>
                                <h1 className="font-h intro-title-v2" style={{ margin: '0 0 16px', lineHeight: 1.1 }}>
                                    방아 찧는 <span className="intro-title-accent-v2">호랑이</span>
                                </h1>
                                <p className="intro-tagline-v2" style={{ fontSize: 20, color: 'var(--text-sub)', marginBottom: 28, fontWeight: 600 }}>
                                    오누이의 지혜와 용기, 그리고 따뜻한 가족 이야기
                                </p>
                                <div className="glass-card-premium" style={{ padding: '24px 28px', marginBottom: 28, maxWidth: 540 }}>
                                    <p style={{ fontSize: 16, color: 'var(--navy)', lineHeight: 1.8, fontWeight: 500, margin: 0, wordBreak: 'keep-all' }}>
                                        깊은 산골에 사는 사이좋은 오누이. 부모님이 집을 비운 어느 날,
                                        감자 굽는 냄새를 따라 <strong style={{ color: 'var(--primary-deep)', fontWeight: 800 }}>무서운 호랑이</strong>가 찾아옵니다.
                                        과연 오누이는 꾀를 내어 위기를 벗어날 수 있을까요?
                                    </p>
                                </div>

                                {/* Premium Gadget Badges */}
                                <div className="premium-gadget-wrap" style={{ marginBottom: 36 }}>
                                    <div className="gadget-meta-item">
                                        <span className="gadget-meta-val gadget-meta-val-accent">3</span>
                                        <span className="gadget-meta-lbl">단계 활동</span>
                                    </div>
                                    <div className="gadget-meta-sep" />
                                    <div className="gadget-meta-item">
                                        <span className="gadget-meta-val">7</span>
                                        <span className="gadget-meta-lbl">핵심 단어</span>
                                    </div>
                                    <div className="gadget-meta-sep" />
                                    <div className="gadget-meta-item">
                                        <span className="gadget-meta-val">15<span style={{ fontSize: 13, fontWeight: 600, marginLeft: 2 }}>분</span></span>
                                        <span className="gadget-meta-lbl">예상 시간</span>
                                    </div>
                                </div>

                                <div className="intro-cta-wrap-v2">
                                    <button className="btn-premium-shine" onClick={onStart}>
                                        <span>독후 활동 시작하기</span>
                                        <span className="btn-premium-shine-arrow">→</span>
                                    </button>
                                    <p className="intro-cta-hint-v2" style={{ fontSize: 13, color: 'var(--text-mute)', marginTop: 8, fontWeight: 600 }}>
                                        ✨ AI와 함께 나만의 이야기를 만들어 보아요~!
                                    </p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<IntroScreen />);
    </script>
</body>

</html>
