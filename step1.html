<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280, initial-scale=1.0">
    <title>단어 플레이 · 방아 찧는 호랑이</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="common.css" />
    <link rel="shortcut icon" href="img/appicon.png" type="image/png" />
    <link rel="apple-touch-icon" href="img/appicon.png" />
</head>

<body>
    <div id="root"></div>
    <script src="common.js"></script>
    <script type="text/babel">
        function SelectScreen() {
            const opts = [
                {
                    mode: 'cross',
                    title: '빈칸 맞추기',
                    desc: '빈칸에 맞는 음절을\n채워봐!',
                    tag: '글자 찾기',
                    reco: '1~3단계 추천',
                    char: 'img/cha_02.png',
                    charStyle: { left: -32, bottom: -24, width: 130 },
                    href: 'step1-cross.html'
                },
                {
                    mode: 'grid',
                    title: '글자 연결',
                    desc: '격자에서 숨어있는\n단어를 찾아봐!',
                    tag: '드래그로 연결',
                    reco: '4~6단계 추천',
                    char: 'img/cha_01.png',
                    charStyle: { right: -32, bottom: -28, width: 110 },
                    href: 'step1-grid.html'
                },
            ];

            const handleSelect = (o) => {
                window.AppState.set('mode', o.mode);
                location.href = o.href;
            };

            return (
                <div className="a-fadeup" style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', minHeight: 'calc(100vh - 120px)', position: 'relative', zIndex: 10 }}>
                    <h2 className="font-h" style={{ fontSize: 44, color: 'var(--navy-dark)', marginBottom: 12, letterSpacing: '-0.02em' }}>단어 플레이</h2>
                    <p style={{ color: 'var(--text-sub)', marginBottom: 68, fontSize: 18, fontWeight: 600 }}>어떤 방식으로 재미있게 단어를 찾아볼까요?</p>

                    <div className="premium-select-grid">
                        {opts.map(o => (
                            <div key={o.mode} className="mode-select-card-premium-wrap" style={{ position: 'relative' }}>
                                <button onClick={() => handleSelect(o)} className="mode-select-card-premium">
                                    <div className="badge-reco-neon">
                                        {o.reco}
                                    </div>
                                    <div className="font-h" style={{ fontSize: 34, color: 'var(--navy-dark)', marginBottom: 16, marginTop: 10, letterSpacing: '-0.01em' }}>
                                        {o.title}
                                    </div>
                                    <p style={{ fontSize: 17, color: 'var(--text-sub)', lineHeight: 1.7, marginBottom: 36, whiteSpace: 'pre-line', fontWeight: 600 }}>
                                        {o.desc}
                                    </p>
                                    <span className="mode-tag-premium">
                                        {o.tag}
                                    </span>
                                </button>
                                <img src={o.char} alt="" style={o.charStyle} className="mode-select-card-premium-char a-bounce" />
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function App() {
            return (
                <div className="premium-aurora-bg" style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column' }}>
                    <window.StepHeader stepIdx={0} />
                    <div style={{ flex: 1, maxWidth: 1280, width: '100%', margin: '0 auto', padding: '0 32px', display: 'flex', flexDirection: 'column', justifyContent: 'center', boxSizing: 'border-box' }}>
                        <SelectScreen />
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

</html>
