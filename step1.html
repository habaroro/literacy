<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280, initial-scale=1.0">
    <title>단어 플레이 · 방아 찧는 호랑이</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="common.css" />
    <link rel="shortcut icon" href="img/appicon.png" type="image/png" />
    <link rel="apple-touch-icon" href="img/appicon.png" />
</head>

<body>
    <div id="root"></div>
    <script src="common.js"></script>
    <script type="text/babel">
        function SelectScreen() {
            const opts = [
                {
                    mode: 'cross',
                    title: '빈칸 맞추기',
                    desc: '빈칸에 맞는 음절을\n채워봐!',
                    tag: '카드로 채우기',
                    reco: '1~3단계 추천',
                    char: 'img/cha_02.png',
                    charStyle: { left: -40, bottom: -20, width: 120 },
                    href: 'step1-cross.html'
                },
                {
                    mode: 'grid',
                    title: '글자 연결',
                    desc: '격자에서 숨어있는\n단어를 찾아봐!',
                    tag: '드래그로 연결',
                    reco: '4~6단계 추천',
                    char: 'img/cha_01.png',
                    charStyle: { right: -40, bottom: -30, width: 105 },
                    href: 'step1-grid.html'
                },
            ];

            const handleSelect = (o) => {
                window.AppState.set('mode', o.mode);
                location.href = o.href;
            };

            return (
                <div className="a-fadeup" style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', minHeight: 'calc(100vh - 70px)' }}>
                    <h2 className="font-h" style={{ fontSize: 40, color: 'var(--navy-dark)', marginBottom: 12 }}>단어 플레이</h2>
                    <p style={{ color: 'var(--gray)', marginBottom: 72, fontSize: 18, fontWeight: 500 }}>어떤 방식으로 단어를 찾아볼까요?</p>
                    <div style={{ display: 'flex', gap: 40, flexWrap: 'wrap', justifyContent: 'center' }}>
                        {opts.map(o => (
                            <div key={o.mode} style={{ position: 'relative' }}>
                                <button onClick={() => handleSelect(o)}
                                    style={{ width: 340, padding: '56px 32px 48px', border: 'none', borderRadius: 32, background: '#fff', cursor: 'pointer', transition: 'all .3s cubic-bezier(0.16,1,0.3,1)', textAlign: 'center', boxShadow: '0 20px 50px rgba(0,0,0,0.06)', position: 'relative' }}
                                    onMouseEnter={e => { e.currentTarget.style.transform = 'translateY(-10px)'; e.currentTarget.style.boxShadow = '0 30px 60px rgba(79,70,229,.12)'; }}
                                    onMouseLeave={e => { e.currentTarget.style.transform = ''; e.currentTarget.style.boxShadow = '0 20px 50px rgba(0,0,0,0.06)'; }}>
                                    <div style={{ position: 'absolute', top: -20, left: '50%', transform: 'translateX(-50%)', background: 'linear-gradient(135deg, var(--primary), var(--primary-deep))', color: '#fff', padding: '10px 24px', borderRadius: 24, fontSize: 15, fontWeight: 800, whiteSpace: 'nowrap', boxShadow: '0 8px 20px rgba(79,70,229,0.3)', zIndex: 10 }}>
                                        {o.reco}
                                    </div>
                                    <div className="font-h" style={{ fontSize: 32, color: 'var(--navy-dark)', marginBottom: 16, marginTop: 30 }}>{o.title}</div>
                                    <p style={{ fontSize: 17, color: 'var(--gray)', lineHeight: 1.7, marginBottom: 32, whiteSpace: 'pre-line', fontWeight: 500 }}>{o.desc}</p>
                                    <span style={{ background: 'var(--blue-light)', color: 'var(--blue)', padding: '10px 24px', borderRadius: 24, fontSize: 15, fontWeight: 700 }}>{o.tag}</span>
                                </button>
                                <img src={o.char} alt="" style={{ position: 'absolute', zIndex: 5, pointerEvents: 'none', ...o.charStyle }} className="a-bounce" />
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function App() {
            return (
                <div style={{ minHeight: '100vh', background: 'linear-gradient(145deg,#EEF2FF 0%,#F8FAFC 45%,#FFF0F8 100%)' }}>
                    <window.StepHeader stepIdx={0} />
                    <div style={{ maxWidth: 1376, margin: '0 auto', padding: '0 32px' }}>
                        <SelectScreen />
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

</html>
